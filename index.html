  <style>
    body { font-family: 'DM Sans', sans-serif; }
    .screen { display: none; }
    .screen.active { display: flex; }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.5s ease forwards; }
    .drag-item { cursor: grab; transition: transform 0.2s, box-shadow 0.2s; }
    .drag-item:active { cursor: grabbing; transform: scale(1.05); }
    .drag-item.dragging { opacity: 0.5; }
    .drop-zone { transition: background 0.2s, border-color 0.2s; }
    .drop-zone.drag-over { border-color: #f97316; background: rgba(249,115,22,0.1); }
    .progress-fill { transition: width 0.5s ease; }
    .hint-box { animation: fadeIn 0.3s ease; }
    .lb-row { animation: slideUp 0.4s ease forwards; opacity: 0; }
    .shake { animation: shake 0.4s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
    .bounce { animation: bounce 0.4s ease; }
    @keyframes bounce { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
    .sorting-btn.active-true { background: #16a34a !important; color: #ffffff !important; border-color: #15803d !important; }
    .sorting-btn.active-false { background: #dc2626 !important; color: #ffffff !important; border-color: #b91c1c !important; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
        font-family: 'DM Sans', sans-serif; 
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    }
    .screen { display: none; width: 100%; max-width: 600px; }
    .screen.active { display: flex; flex-direction: column; }
    
    button { touch-action: manipulation; }
    .question-area { width: 100%; }
    .lb-row { animation: slideUp 0.4s ease forwards; opacity: 0; width: 100%; }
  </style>
 </head>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyArKIBD9RWIOhNgPrPLKtPHn1EsQUHjmE8",
        authDomain: "score-57210.firebaseapp.com",
        databaseURL: "https://score-57210-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "score-57210",
        storageBucket: "score-57210.firebasestorage.app",
        messagingSenderId: "425618398285",
        appId: "1:425618398285:web:47eccf49c844df2e865004"
    };

    // Khởi tạo Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 1. Theo dõi số lượng người Online
    const connectedRef = ref(db, ".info/connected");
    const onlineUsersRef = ref(db, 'online_users');

    onValue(connectedRef, (snap) => {
        if (snap.val() === true) {
            const myConnectionsRef = push(onlineUsersRef);
            // Tự động xóa node khi người dùng đóng trình duyệt
            onDisconnect(myConnectionsRef).remove();
            set(myConnectionsRef, true);
        }
    });

    // Cập nhật con số hiển thị lên màn hình
    onValue(onlineUsersRef, (snapshot) => {
        const count = snapshot.size;
        const counter = document.getElementById('online-count');
        if (counter) {
            counter.innerText = count; 
        }
    });

    // 2. Giao tiếp với Game (Lưu điểm)
    window.dataSdk = {
        create: async function(data) {
            await push(ref(db, 'leaderboard'), data);
            return { isOk: true };
        }
    };

    // 3. Lắng nghe cập nhật Bảng xếp hạng Realtime
    onValue(ref(db, 'leaderboard'), (snapshot) => {
        const data = [];
        snapshot.forEach(child => { data.push(child.val()); });
        // Sắp xếp: Ưu tiên điểm cao, nếu điểm bằng nhau ưu tiên thời gian thấp
        data.sort((a,b) => b.score - a.score || a.completion_time - b.completion_time);
        
        if (typeof window.updateLeaderboardData === 'function') {
            window.updateLeaderboardData(data);
        }
    });
  </script>

  <script>
    // Hàm nhận dữ liệu Realtime từ Firebase
    function updateLeaderboardData(newData) {
        leaderboardData = newData;
        if (document.getElementById('leaderboard-screen').classList.contains('active')) {
            renderLeaderboard();
        }
    }

    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function playSound(freq, type, dur) {
        initAudio();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = type; o.frequency.value = freq;
        g.gain.setValueAtTime(0.15, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        o.start(); o.stop(audioCtx.currentTime + dur);
    }
    function correctSound() { playSound(523,'sine',0.15); setTimeout(()=>playSound(659,'sine',0.15),100); setTimeout(()=>playSound(784,'sine',0.3),200); }
    function wrongSound() { playSound(200,'square',0.3); }

    function startLevel1() { startLevel(1, LEVEL_1_QUESTIONS); }
    function startLevel2() { startLevel(2, LEVEL_2_QUESTIONS); }
    function startLevel3() { startLevel(3, LEVEL_3_QUESTIONS); }

    const LEVEL_0_QUESTIONS = [
        { id: "L0_Q1", level: 0, question_set: "LEVEL_0", tags: ["cơ_năng", "khái_niệm"], type: 'choice', topic: 'Cơ năng', question: 'Cơ năng của một vật bằng:', options: ['Hiệu của động năng và thế năng của vật.', 'Hiệu của thế năng và động năng của vật.', 'Tổng động năng và thế năng của vật.', 'Tích của động năng và thế năng của vật.'], correct_answer: 2, hint1: '💡 Gợi ý: Em hãy nhớ cơ năng liên quan đến cả động năng và thế năng của vật, không phải chỉ một trong hai dạng năng lượng.', hint2: 'Cơ năng = Động năng + Thế năng', explanation: 'Đáp án đúng là:\nC. Tổng động năng và thế năng của vật.\n📘 Giải thích đáp án:\nCơ năng của một vật là tổng động năng và thế năng của vật.\nCông thức:\nW = Wđ + Wt\nCơ năng không phải là hiệu hoặc tích của động năng và thế năng.' },
    { id: "L0_Q2", level: 0, question_set: "LEVEL_0", tags: ["bảo_toàn_cơ_năng", "rơi_tự_do"], type: 'sorting', topic: 'Bảo toàn cơ năng', question: 'Khi một vật được thả rơi tự do, bỏ qua lực cản không khí, hãy chọn phát biểu Đúng hoặc Sai.', statements: ['Động năng của vật tăng dần.', 'Thế năng của vật giảm dần.', 'Tổng động năng và thế năng của vật không đổi.', 'Cơ năng của vật luôn thay đổi.'], answers: [true, true, true, false], hint1: '💡 Gợi ý: Em hãy xét quá trình vật rơi tự do: độ cao giảm dần còn tốc độ tăng dần. Khi bỏ qua lực cản không khí, tổng động năng và thế năng có thay đổi không?', hint2: 'Trong rơi tự do không có lực cản, cơ năng được bảo toàn. Động năng tăng, thế năng giảm nhưng tổng không đổi.', explanation: 'Đáp án đúng là:\n1: Đúng.\n2: Đúng.\n3: Đúng.\n4: Sai.\n📘 Giải thích đáp án:\nKhi vật rơi tự do, tốc độ của vật tăng dần nên động năng tăng.\nĐộ cao của vật giảm dần nên thế năng giảm.\nDo bỏ qua lực cản không khí, tổng động năng và thế năng của vật không đổi.\nPhát biểu “cơ năng của vật luôn thay đổi” là sai.' },
    { id: "L0_Q3", level: 0, question_set: "LEVEL_0", tags: ["rơi_tự_do", "chuyển_hóa"], type: 'dragdrop', topic: 'Rơi tự do', question: 'Khi vật rơi từ độ cao h xuống mặt đất, bỏ qua lực cản không khí, hãy ghép mỗi đại lượng với sự biến đổi tương ứng:', pairs: [['Động năng', 'Tăng'], ['Thế năng', 'Giảm'], ['Cơ năng', 'Không đổi']], hint1: '💡 Gợi ý: Em hãy quan sát sự biến đổi khi vật rơi xuống: tốc độ tăng, độ cao giảm. Từ đó ghép từng đại lượng với sự thay đổi phù hợp.', hint2: 'Cơ năng = Động năng + Thế năng. Khi không có lực cản, cơ năng được bảo toàn.', explanation: 'Đáp án đúng là:\nĐộng năng → Tăng\nThế năng → Giảm\nCơ năng → Không đổi\n📘 Giải thích đáp án:\nKhi vật rơi xuống, tốc độ của vật tăng còn độ cao giảm.\nPhân tích:\nTốc độ tăng nên động năng tăng.\nĐộ cao giảm nên thế năng giảm.\nBỏ qua lực cản không khí nên cơ năng không đổi.' },
    { id: "L0_Q4", level: 0, question_set: "LEVEL_0", tags: ["chuyển_hóa_năng_lượng", "động_năng", "thế_năng"], type: 'fillin', topic: 'Chuyển hóa năng lượng', question: 'Khi một quả bóng được ném thẳng đứng lên cao, trong quá trình bóng đi lên, một phần [___] chuyển hóa thành [___].', answer: ['động năng|thế năng', 'thế năng|động năng'], hint1: '💡 Gợi ý: Em hãy xét quá trình bóng đi lên: tốc độ của bóng giảm dần còn độ cao tăng dần. Dạng năng lượng nào giảm và dạng năng lượng nào tăng?', hint2: 'Động năng liên quan đến vận tốc, thế năng liên quan đến độ cao.', explanation: 'Đáp án đúng là:\nMột phần động năng chuyển hóa thành thế năng.\n📘 Giải thích đáp án:\nKhi quả bóng đi lên, vận tốc của bóng giảm còn độ cao tăng.\nPhân tích:\nVận tốc giảm nên động năng giảm.\nĐộ cao tăng nên thế năng tăng.\nSự chuyển hóa:\nMột phần động năng chuyển hóa thành thế năng.' },
    { id: "L0_Q5", level: 0, question_set: "LEVEL_0", tags: ["bảo_toàn_cơ_năng", "ném_lên"], type: 'choice', topic: 'Bảo toàn cơ năng', question: 'Một vật nhỏ được ném lên từ điểm M phía trên mặt đất; vật lên tới điểm N thì dừng lại rồi rơi xuống. Bỏ qua sức cản của không khí. Trong quá trình vật chuyển động từ M đến N, phát biểu nào đúng?', options: ['Cơ năng không đổi.', 'Thế năng giảm.', 'Cơ năng cực đại tại N.', 'Động năng tăng.'], correct_answer: 0, hint1: '💡 Gợi ý: Em hãy chú ý điều kiện "bỏ qua sức cản của không khí". Khi đó, trong quá trình vật đi từ M đến N, động năng và thế năng có thể thay đổi, nhưng tổng của chúng có thay đổi không?', hint2: 'Bảo toàn cơ năng có nghĩa là tổng động năng và thế năng không đổi.', explanation: 'Đáp án đúng là:\nA. Cơ năng không đổi.\n📘 Giải thích đáp án:\nVật chuyển động từ M đến N và bỏ qua sức cản của không khí.\nPhân tích:\nTrong quá trình đi lên, động năng giảm và thế năng tăng.\nTổng động năng và thế năng không đổi.\nCơ năng không cực đại riêng tại N mà được bảo toàn trong suốt quá trình chuyển động.' },
    { id: "L0_Q6", level: 0, question_set: "LEVEL_0", tags: ["tính_toán", "bảo_toàn_cơ_năng"], type: 'choice', topic: 'Tính toán cơ năng', question: 'Khi một bạn học sinh thả một quả bóng trong trọng trường thì cơ năng của quả bóng được bảo toàn. Chọn mốc thế năng tại mặt đất. Tại một vị trí, quả bóng có động năng và thế năng lần lượt là 5 J và 15 J. Tại một vị trí khác, thế năng của quả bóng là 8 J. Khi đó động năng của quả bóng bằng bao nhiêu?', options: ['20 J', '10 J', '6 J', '12 J'], correct_answer: 3, hint1: '💡 Gợi ý: Em hãy tính tổng động năng và thế năng ban đầu để tìm cơ năng của quả bóng. Sau đó dùng cơ năng đó để tìm phần động năng còn lại khi biết thế năng ở vị trí khác.', hint2: 'Từ vị trí đầu: Cơ năng = 5 + 15 = 20 J. Tại vị trí khác: 20 = Động năng + 8.', explanation: 'Đáp án đúng là:\nD. 12 J.\n📘 Giải thích đáp án:\nCơ năng ban đầu:\nW = Wđ + Wt\nThay số:\nW = 5 + 15 = 20 J\nKhi thế năng là 8 J:\nW = Wđ + Wt\nSuy ra:\nWđ = W - Wt\nThay số:\nWđ = 20 - 8 = 12 J' },
    { id: "L0_Q7", level: 0, question_set: "LEVEL_0", tags: ["tính_toán", "động_năng", "ném_lên"], type: 'fillin', unit: 'J', topic: 'Tính cơ năng', question: 'Từ mặt đất, một vật có khối lượng 200 g được ném lên với vận tốc 30 m/s. Chọn mốc thế năng tại mặt đất. Bỏ qua sức cản không khí. Cơ năng của vật khi ném là bao nhiêu?', answer: '90', hint1: '💡 Gợi ý: Em hãy nhớ đổi khối lượng 200 g sang kg trước. Vì vật được ném từ mặt đất và chọn mốc thế năng tại mặt đất, hãy xét dạng năng lượng ban đầu của vật.', hint2: 'Động năng = (1/2)mv² = (1/2) × 0,2 × 30² = 90 J', explanation: 'Đáp án đúng là:\n90 J.\n📘 Giải thích đáp án:\nĐổi đơn vị:\n200 g = 0,2 kg\nTại mặt đất:\nThế năng bằng 0 vì chọn mốc thế năng tại mặt đất.\nCơ năng khi ném:\nW = Wđ\nCông thức:\nWđ = 1/2.m.v²\nThay số:\nWđ = 1/2.0,2.30² = 90 J' },
    { id: "L0_Q8", level: 0, question_set: "LEVEL_0", tags: ["rơi_tự_do", "tính_toán", "động_năng"], type: 'fillin', unit: 'J', topic: 'Rơi tự do', question: 'Một vật có khối lượng 500 g rơi tự do từ độ cao 100 m xuống đất. Lấy g = 10 m/s². Động năng của vật tại độ cao 50 m so với mặt đất bằng bao nhiêu?', answer: '250', hint1: '💡 Gợi ý: Em hãy xác định vật đã rơi được bao nhiêu mét so với vị trí ban đầu. Phần thế năng giảm đi trong quãng đường đó sẽ chuyển hóa thành dạng năng lượng nào?', hint2: 'Cơ năng ban đầu = 0,5 × 10 × 100 = 500 J. Tại h=50m: Wd = 500 - 250 = 250 J', explanation: 'Đáp án đúng là:\n250 J.\n📘 Giải thích đáp án:\nĐổi đơn vị:\n500 g = 0,5 kg\nVật đã rơi được:\ns = 100 - 50 = 50 m\nPhần thế năng giảm đi chuyển hóa thành động năng.\nCông thức:\nWđ = m.g.s\nThay số:\nWđ = 0,5.10.50 = 250 J' },
    { id: "L0_Q9", level: 0, question_set: "LEVEL_0", tags: ["bảo_toàn_cơ_năng", "tính_toán"], type: 'slider', topic: 'Bảo toàn cơ năng', question: 'Một vật được thả rơi tự do không vận tốc đầu từ độ cao 60 m so với mặt đất. Chọn mốc thế năng tại mặt đất. Hãy chọn độ cao mà tại đó động năng của vật bằng 3 lần thế năng của vật.', min: 0, max: 60, step: 5, unit: 'm', correct_answer: 15, hint1: '💡 Gợi ý: Em hãy gọi độ cao cần chọn là h. Khi động năng bằng 3 lần thế năng, hãy so sánh phần năng lượng ứng với độ cao còn lại và phần năng lượng đã chuyển thành động năng.', hint2: '4mgh = mg×60, suy ra h = 15 m.', explanation: 'Đáp án đúng là:\n15 m.\n📘 Giải thích đáp án:\nGọi độ cao cần chọn là:\nh\nCơ năng ban đầu:\nW = mg.60\nTại độ cao h:\nThế năng là mg.h\nĐộng năng là mg.(60 - h)\nĐiều kiện:\nWđ = 3Wt\nThay vào:\nmg.(60 - h) = 3mg.h\nRút gọn:\n60 - h = 3h\nSuy ra:\nh = 15 m' },
    { id: "L0_Q10", level: 0, question_set: "LEVEL_0", tags: ["chuyển_hóa_năng_lượng", "tính_toán", "ném"], type: 'choice', topic: 'Chuyển hóa năng lượng', question: 'Một quả bóng khối lượng 200 g được ném thẳng đứng xuống dưới từ độ cao 20 m so với mặt đất. Khi chạm đất, bóng nảy lên đến độ cao 40 m. Bỏ qua lực cản không khí và coi va chạm không làm mất mát cơ năng. Lấy g = 10 m/s². Vận tốc ném ban đầu của bóng là bao nhiêu?', options: ['15 m/s', '25 m/s', '20 m/s', '10 m/s'], correct_answer: 2, hint1: '💡 Gợi ý: Em hãy so sánh cơ năng ban đầu ở độ cao 20 m với cơ năng khi bóng nảy lên đến độ cao 40 m. Phần chênh lệch năng lượng liên quan đến vận tốc ném ban đầu.', hint2: '(1/2)×0,2×v₀² + 0,2×10×20 = 0,2×10×40', explanation: 'Đáp án đúng là:\nC. 20 m/s.\n📘 Giải thích đáp án:\nCơ năng khi bóng nảy lên đến độ cao 40 m:\nW = mg.40\nCơ năng ban đầu:\nBóng ở độ cao 20 m và có vận tốc ban đầu v0.\nBiểu thức:\nW = mg.20 + 1/2.m.v0²\nBảo toàn cơ năng:\nmg.20 + 1/2.m.v0² = mg.40\nRút gọn:\n1/2.v0² = g.(40 - 20)\nThay số:\n1/2.v0² = 10.20 = 200\nSuy ra:\nv0² = 400\nv0 = 20 m/s' }
];

    const LEVEL_1_QUESTIONS = [
        { id: "L1_Q1", level: 1, question_set: "LEVEL_1", tags: ["công_thức", "khái_niệm"], type: 'dragdrop', topic: 'Công thức cơ bản', question: 'Hãy ghép mỗi đại lượng vật lí với công thức tương ứng.', pairs: [['Động năng', 'Wđ = 1/2.m.v²'], ['Thế năng trọng trường', 'Wt = m.g.h'], ['Cơ năng', 'W = Wđ + Wt']], hint1: '💡 Em hãy dựa vào ý nghĩa của từng đại lượng. Đại lượng liên quan đến chuyển động sẽ gắn với vận tốc; đại lượng liên quan đến độ cao sẽ gắn với h; còn cơ năng liên quan đến cả hai dạng năng lượng.', hint2: 'Động năng = (1/2)mv², Thế năng = mgh, Cơ năng = Động năng + Thế năng', explanation: 'Đáp án đúng là:\nĐộng năng → Wđ = 1/2.m.v²\nThế năng trọng trường → Wt = m.g.h\nCơ năng → W = Wđ + Wt\n📘 Giải thích đáp án:\nĐộng năng là năng lượng mà vật có được do chuyển động.\nThế năng trọng trường là năng lượng liên quan đến vị trí của vật trong trọng trường.\nCơ năng là tổng động năng và thế năng của vật.\nGhi nhớ:\nW = Wđ + Wt' },
        { id: "L1_Q2", level: 1, question_set: "LEVEL_1", tags: ["khái_niệm", "đại_lượng"], type: 'choice', topic: 'Khái niệm cơ năng', question: 'Hãy chọn thẻ mô tả đúng về cơ năng.', options: ['Cơ năng là đại lượng vô hướng.', 'Cơ năng là vectơ cùng hướng với vận tốc.', 'Cơ năng là vectơ cùng hướng với trọng lực.', 'Cơ năng chỉ phụ thuộc vào thời gian.'], correct_answer: 0, hint1: '💡 Em hãy nhớ cơ năng là một dạng năng lượng. Khi xét một dạng năng lượng, em cần xác định nó có hướng như vectơ hay chỉ có giá trị độ lớn.', hint2: 'Năng lượng không có phương và chiều, nó chỉ có giá trị lớn.', explanation: 'Đáp án đúng là:\nA. Cơ năng là đại lượng vô hướng.\n📘 Giải thích đáp án:\nCơ năng là một dạng năng lượng.\nNăng lượng là đại lượng vô hướng, không có hướng như vectơ.\nDo đó, cơ năng không phải là vectơ cùng hướng với vận tốc hay trọng lực.' },
        { id: "L1_Q3", level: 1, question_set: "LEVEL_1", tags: ["bảo_toàn_cơ_năng", "rơi_tự_do"], type: 'sorting', topic: 'Bảo toàn cơ năng', question: 'Khi một vật rơi tự do và bỏ qua lực cản không khí, hãy chọn Đúng hoặc Sai.', statements: ['Cơ năng của vật được bảo toàn.', 'Tổng động năng và thế năng của vật không đổi.', 'Cơ năng của vật luôn giảm trong quá trình rơi.', 'Cơ năng của vật chỉ gồm động năng.'], answers: [true, true, false, false], hint1: '💡 Gợi ý: Em hãy nhớ lại định nghĩa cơ năng và điều kiện bảo toàn cơ năng trong trọng trường nhé.', hint2: 'Cơ năng là tổng động năng và thế năng. Trong môi trường không có lực cản, tổng này luôn giữ nguyên.', explanation: 'Đáp án đúng là:\n1: Đúng.\n2: Đúng.\n3: Sai.\n4: Sai.\n📘 Giải thích đáp án:\nCơ năng được bảo toàn khi không có lực cản, tổng động năng và thế năng không đổi.\nPhát biểu 3 và 4 sai vì cơ năng không giảm và luôn bao gồm cả hai loại năng lượng là động năng và thế năng.' },
        { id: "L1_Q4", level: 1, question_set: "LEVEL_1", tags: ["con_lắc", "chuyển_hóa"], type: 'choice', topic: 'Con lắc đơn', question: 'Một con lắc đơn dao động, bỏ qua lực cản không khí. Khi vật đi từ vị trí biên về vị trí thấp nhất thì:', options: ['Động năng giảm, thế năng tăng.', 'Động năng tăng, thế năng giảm.', 'Động năng và thế năng đều tăng.', 'Động năng và thế năng đều giảm.'], correct_answer: 1, hint1: '💡 Em hãy quan sát vị trí của vật trên quỹ đạo con lắc. Vị trí nào có độ cao nhỏ nhất thì thế năng nhỏ nhất; vị trí nào vật chuyển động nhanh nhất thì động năng lớn nhất.', hint2: 'Khi xuống: h giảm nên Wt giảm, v tăng nên Wđ tăng. Khi lên: v giảm nên Wđ giảm, h tăng nên Wt tăng.', explanation: 'Đáp án đúng là: B\n📘 Giải thích đáp án:\nKhi con lắc đi từ vị trí biên về vị trí cân bằng, vật chuyển động nhanh dần nên động năng tăng. Đồng thời độ cao giảm nên thế năng giảm. Do bỏ qua lực cản không khí nên cơ năng được bảo toàn, tức là không đổi trong suốt quá trình dao động.' },
        { id: "L1_Q5", level: 1, question_set: "LEVEL_1", tags: ["ném_ngang", "bảo_toàn_cơ_năng"], type: 'dragdrop', topic: 'Ném ngang', question: 'Một quả bóng được ném ngang khỏi mặt bàn và rơi xuống sàn. Bỏ qua lực cản không khí. Hãy ghép mỗi đại lượng với sự biến đổi phù hợp trong quá trình bóng rơi xuống.', pairs: [['Động năng', 'Tăng'], ['Thế năng', 'Giảm'], ['Cơ năng', 'Không đổi']], hint1: '💡 Em hãy xét quá trình quả bóng rơi xuống: độ cao giảm dần, tốc độ tăng dần. Từ đó suy ra dạng năng lượng nào tăng, dạng nào giảm và tổng cơ năng có đổi không.', hint2: 'Bỏ qua lực cản không khí, nên cơ năng được bảo toàn.', explanation: 'Đáp án đúng là:\nĐộng năng → Tăng\nThế năng → Giảm\nCơ năng → Không đổi\n📘 Giải thích đáp án:\nKhi quả bóng rơi xuống, độ cao của bóng giảm còn tốc độ của bóng tăng.\nPhân tích:\nĐộ cao giảm nên thế năng giảm.\nTốc độ của bóng tăng nên động năng tăng.\nBỏ qua lực cản không khí nên cơ năng được bảo toàn.' },
        { id: "L1_Q6", level: 1, question_set: "LEVEL_1", tags: ["bảo_toàn_cơ_năng", "ném_thẳng_đứng"], type: 'sorting', topic: 'Bảo toàn cơ năng', question: 'Khi một vật được ném thẳng đứng lên cao (bỏ qua lực cản không khí), hãy chọn Đúng hoặc Sai.', statements: ['Tại vị trí cao nhất, vận tốc của vật bằng 0.', 'Tại vị trí cao nhất, động năng của vật đạt giá trị cực đại.', 'Trong quá trình chuyển động, cơ năng của vật không đổi.', 'Khi vật đi lên, thế năng của vật giảm dần.'], answers: [true, false, true, false], hint1: '💡 Gợi ý: Tại vị trí cao nhất, vật dừng lại hay tiếp tục chuyển động? Khi đi lên, độ cao của vật thay đổi thế nào?', hint2: 'Động năng phụ thuộc vào vận tốc, thế năng phụ thuộc vào độ cao. Trong ném thẳng đứng, vận tốc giảm dần khi đi lên.', explanation: 'Đáp án đúng là:\n1: Đúng.\n2: Sai.\n3: Đúng.\n4: Sai.\n📘 Giải thích đáp án:\nTại vị trí cao nhất, vận tốc bằng 0 nên động năng bằng 0 (chứ không phải cực đại).\nCơ năng được bảo toàn.\nKhi vật đi lên, độ cao tăng nên thế năng tăng (chứ không phải giảm).' },
        { id: "L1_Q7", level: 1, question_set: "LEVEL_1", tags: ["con_lắc", "chuyển_hóa"], type: 'dragdrop', topic: 'Dao động con lắc', question: 'Hãy ghép quá trình chuyển động của con lắc với sự chuyển hóa năng lượng phù hợp.', pairs: [['Từ vị trí cao xuống vị trí thấp nhất', 'Thế năng giảm, động năng tăng'], ['Từ vị trí thấp nhất đi lên vị trí cao', 'Động năng giảm, thế năng tăng'], ['Nếu bỏ qua lực cản', 'Cơ năng không đổi']], hint1: '💡 Em hãy so sánh hai chiều chuyển động của con lắc: khi vật đi xuống thấp hơn và khi vật đi lên cao hơn. Hai quá trình này có sự chuyển hóa năng lượng ngược nhau.', hint2: 'Khi xuống: h giảm nên Wt giảm, v tăng nên Wđ tăng. Khi lên: v giảm nên Wđ giảm, h tăng nên Wt tăng.', explanation: 'Đáp án đúng là:\nTừ vị trí cao xuống vị trí thấp nhất → Thế năng giảm, động năng tăng\nTừ vị trí thấp nhất đi lên vị trí cao → Động năng giảm, thế năng tăng\nNếu bỏ qua lực cản → Cơ năng không đổi\n📘 Giải thích đáp án:\nTrong dao động của con lắc, động năng và thế năng chuyển hóa qua lại.\nPhân tích:\nKhi vật đi từ vị trí cao xuống vị trí thấp nhất, độ cao giảm nên thế năng giảm, vận tốc tăng nên động năng tăng.\nKhi vật đi từ vị trí thấp nhất lên vị trí cao, vận tốc giảm nên động năng giảm, độ cao tăng nên thế năng tăng.\nNếu bỏ qua lực cản, cơ năng của con lắc không đổi.' },
        { id: "L1_Q8", level: 1, question_set: "LEVEL_1", tags: ["tính_toán", "thế_năng"], type: 'fillin', unit: 'J', topic: 'Tính toán thế năng', question: 'Một vật có khối lượng m = 1 kg ở độ cao h = 5 m so với mặt đất. Chọn mốc thế năng tại mặt đất. Lấy g = 10 m/s². Thế năng trọng trường của vật bằng bao nhiêu?', answer: '50', hint1: '💡 Em hãy xác định đúng ba đại lượng cần dùng để tính thế năng trọng trường: khối lượng, gia tốc trọng trường và độ cao so với mốc thế năng.', hint2: 'Wt = 1 × 10 × 5 = 50 J', explanation: 'Đáp án đúng là:\n50 J.\n📘 Giải thích đáp án:\nCông thức:\nWt = m.g.h\nThay số:\nWt = 1.10.5 = 50 J' },
    { id: "L1_Q9", level: 1, question_set: "LEVEL_1", tags: ["tính_toán", "động_năng", "rơi_tự_do"], type: 'fillin', unit: 'J', topic: 'Tính toán động năng', question: 'Một vật có khối lượng 1 kg rơi tự do từ độ cao 50 cm xuống đất. Lấy g = 10 m/s², bỏ qua lực cản không khí. Động năng của vật ngay trước khi chạm đất bằng bao nhiêu?', answer: '5', hint1: '💡 Em hãy nhớ đổi đơn vị 50 cm. Sau đó xét xem thế năng ban đầu đã chuyển hóa thành dạng năng lượng nào ngay trước khi vật chạm đất.', hint2: 'Wđ = m.g.h = 1 × 10 × 0,5 = 5 J', explanation: 'Đáp án đúng là:\n5 J.\n📘 Giải thích đáp án:\nĐổi đơn vị:\n50 cm = 0,5 m\nVật rơi tự do từ trạng thái nghỉ và bỏ qua lực cản không khí.\nThế năng ban đầu chuyển hóa thành động năng ngay trước khi vật chạm đất.\nCông thức:\nWđ = m.g.h\nThay số:\nWđ = 1.10.0,5 = 5 J' },
    
        { id: "L1_Q10", level: 1, question_set: "LEVEL_1", tags: ["tính_toán", "bảo_toàn_cơ_năng"], type: 'choice', topic: 'Bảo toàn cơ năng - Ứng dụng', question: 'Một quả bóng khối lượng 200 g được ném thẳng đứng xuống dưới từ độ cao 20 m so với mặt đất. Khi chạm đất, bóng nảy lên đến độ cao 40 m. Bỏ qua lực cản không khí và coi va chạm không làm mất mát cơ năng. Lấy g = 10 m/s². Vận tốc ném ban đầu của bóng là bao nhiêu?', options: ['15 m/s', '25 m/s', '20 m/s', '10 m/s'], correct_answer: 2, hint1: '💡 Gợi ý: Em hãy dùng định luật bảo toàn cơ năng. Cơ năng lúc ném (tại độ cao 20m với vận tốc v0) phải bằng cơ năng tại điểm cao nhất khi bóng nảy lên (tại độ cao 40m với vận tốc bằng 0). Viết phương trình Wđầu = Wsau rồi giải tìm v0 nhé!', hint2: 'Phương trình: m*g*20 + 0.5*m*v0² = m*g*40. Rút gọn m và giải v0² = 2*g*(40-20).', explanation: 'Đáp án đúng là: C. 20 m/s.\n📘 Giải thích:\nCơ năng tại điểm cao nhất: W = mg.40\nCơ năng lúc ném: W = mg.20 + 1/2.m.v0²\nVì cơ năng bảo toàn: mg.20 + 1/2.m.v0² = mg.40\n=> 0,5.v0² = 10.(40-20) = 200\n=> v0² = 400 => v0 = 20 m/s.' }
    ];

    const LEVEL_2_QUESTIONS = [
        { id: "L2_Q1", level: 2, question_set: "LEVEL_2", tags: ["khái_niệm", "cơ_năng"], type: 'dragdrop', topic: 'Đại lượng vật lí', question: 'Hãy ghép mỗi đại lượng vật lí với mô tả tương ứng.', pairs: [['Động năng', 'Năng lượng liên quan đến chuyển động của vật.'], ['Thế năng trọng trường', 'Năng lượng liên quan đến vị trí của vật trong trọng trường.'], ['Cơ năng', 'Tổng động năng và thế năng của vật.']], hint1: '💡 Gợi ý: Em hãy nhớ động năng gắn với chuyển động, thế năng trọng trường gắn với độ cao, còn cơ năng gồm cả động năng và thế năng.', hint2: 'Cơ năng = Động năng + Thế năng trọng trường.', explanation: 'Đáp án đúng là:\nĐộng năng → Năng lượng liên quan đến chuyển động của vật.\nThế năng trọng trường → Năng lượng liên quan đến vị trí của vật trong trọng trường.\nCơ năng → Tổng động năng và thế năng của vật.\n📘 Giải thích đáp án:\nĐộng năng là năng lượng mà vật có được do chuyển động.\nThế năng trọng trường là năng lượng liên quan đến vị trí của vật trong trọng trường.\nCơ năng là tổng động năng và thế năng của vật.\nW = Wđ + Wt' },
        { id: "L2_Q2", level: 2, question_set: "LEVEL_2", tags: ["bảo_toàn_cơ_năng", "lý_thuyết"], type: 'sorting', topic: 'Bảo toàn cơ năng', question: 'Khi một vật chuyển động trong trọng trường và bỏ qua lực cản không khí, hãy cho biết các phát biểu sau là Đúng hay Sai.', statements: ['Cơ năng của vật được bảo toàn.', 'Động năng và thế năng có thể thay đổi trong quá trình chuyển động.', 'Tổng động năng và thế năng của vật không đổi.', 'Cơ năng luôn giảm trong quá trình chuyển động.'], answers: [true, true, true, false], hint1: '💡 Gợi ý: Em hãy chú ý điều kiện “bỏ qua lực cản không khí”. Khi đó, động năng và thế năng có thể chuyển hóa qua lại, nhưng tổng của chúng có thay đổi không?', hint2: 'Khi không có lực cản, tổng Wđ + Wt luôn là một hằng số.', explanation: 'Đáp án đúng là:\nPhát biểu 1: Đúng.\nPhát biểu 2: Đúng.\nPhát biểu 3: Đúng.\nPhát biểu 4: Sai.\n📘 Giải thích đáp án:\nKhi vật chuyển động trong trọng trường và bỏ qua lực cản không khí, cơ năng của vật được bảo toàn.\nĐộng năng và thế năng có thể thay đổi trong quá trình chuyển động.\nTuy nhiên, tổng động năng và thế năng không đổi.\nPhát biểu “cơ năng luôn giảm trong quá trình chuyển động” là sai.' },
        { id: "L2_Q3", level: 2, question_set: "LEVEL_2", tags: ["rơi_tự_do", "cơ_năng"], type: 'choice', topic: 'Rơi tự do', question: 'Một vật được thả rơi từ một độ cao so với mặt đất. Ngay lúc vừa thả, vận tốc của vật bằng 0. Chọn mốc thế năng tại mặt đất. Phát biểu nào sau đây đúng về cơ năng ban đầu của vật?', options: ['Cơ năng của vật bằng thế năng tại vị trí thả.', 'Cơ năng của vật bằng động năng tại vị trí thả.', 'Cơ năng của vật bằng 0.', 'Cơ năng của vật chỉ phụ thuộc vào vận tốc.'], correct_answer: 0, hint1: '💡 Gợi ý: Em hãy xét thời điểm vật vừa được thả. Khi đó vận tốc của vật bằng bao nhiêu? Động năng ban đầu có giá trị như thế nào?', hint2: 'Vận tốc bằng 0 nghĩa là Động năng bằng 0. Vậy Cơ năng chỉ còn lại gì?', explanation: 'Đáp án đúng là:\nA. Cơ năng của vật bằng thế năng tại vị trí thả.\n📘 Giải thích đáp án:\nCơ năng của vật bằng tổng động năng và thế năng.\nW = Wđ + Wt\nNgay lúc vừa thả, vận tốc của vật bằng 0 nên động năng bằng 0.\nDo đó:\nW = 0 + Wt = Wt\nCơ năng ban đầu của vật bằng thế năng tại vị trí thả.' },
        { id: "L2_Q4", level: 2, question_set: "LEVEL_2", tags: ["rơi_tự_do", "chuyển_hóa"], type: 'dragdrop', topic: 'Sự biến đổi năng lượng', question: 'Một quả bóng rơi xuống từ một độ cao so với mặt đất. Bỏ qua lực cản không khí. Hãy ghép mỗi đại lượng với sự biến đổi phù hợp trong quá trình bóng rơi xuống.', pairs: [['Động năng', 'Tăng.'], ['Thế năng', 'Giảm.'], ['Cơ năng', 'Không đổi.']], hint1: '💡 Gợi ý: Khi quả bóng rơi xuống, độ cao của bóng giảm còn tốc độ tăng. Hãy dựa vào đó để xác định sự biến đổi của từng dạng năng lượng.', hint2: 'Độ cao giảm -> Thế năng giảm. Tốc độ tăng -> Động năng tăng. Tổng không đổi.', explanation: 'Đáp án đúng là:\nĐộng năng → Tăng.\nThế năng → Giảm.\nCơ năng → Không đổi.\n📘 Giải thích đáp án:\nKhi quả bóng rơi xuống, độ cao của bóng giảm nên thế năng giảm.\nTốc độ của bóng tăng nên động năng tăng.\nDo bỏ qua lực cản không khí, cơ năng của bóng được bảo toàn nên không đổi.' },
        { id: "L2_Q5", level: 2, question_set: "LEVEL_2", tags: ["con_lắc", "chuyển_hóa"], type: 'choice', topic: 'Con lắc đơn', question: 'Một con lắc đơn chuyển động từ vị trí thấp nhất lên vị trí cao hơn. Bỏ qua lực cản không khí. Trong quá trình đó, phát biểu nào sau đây đúng?', options: ['Động năng giảm, thế năng tăng.', 'Động năng tăng, thế năng giảm.', 'Động năng và thế năng đều tăng.', 'Cơ năng giảm dần.'], correct_answer: 0, hint1: '💡 Gợi ý: Khi con lắc đi lên cao hơn, độ cao của vật tăng còn tốc độ của vật giảm. Hãy xét động năng và thế năng theo hai đại lượng này.', hint2: 'Vật đi lên chậm dần (v giảm) và cao lên (h tăng).', explanation: 'Đáp án đúng là:\nA. Động năng giảm, thế năng tăng.\n📘 Giải thích đáp án:\nKhi con lắc đi từ vị trí thấp nhất lên vị trí cao hơn, vật chuyển động chậm dần nên động năng giảm.\nĐộ cao của vật tăng nên thế năng tăng.\nNếu bỏ qua lực cản không khí, cơ năng của con lắc vẫn không đổi.' },
        { id: "L2_Q6", level: 2, question_set: "LEVEL_2", tags: ["tính_toán", "cơ_năng"], type: 'fillin', unit: 'J', topic: 'Tính cơ năng', question: 'Một vật có khối lượng 100 g đang ở độ cao 1 m so với mặt đất và có vận tốc 4 m/s. Chọn mốc thế năng tại mặt đất. Lấy g = 10 m/s². Cơ năng của vật bằng bao nhiêu?', answer: '1,8|1.8', hint1: '💡 Gợi ý: Em hãy đổi 100 g sang kg. Sau đó tính riêng động năng và thế năng rồi cộng hai giá trị đó để tìm cơ năng.', hint2: 'Wđ = 1/2*0.1*4² = 0.8 J. Wt = 0.1*10*1 = 1 J. Cộng lại nhé!', explanation: 'Đáp án đúng là:\n1,8 J.\n📘 Giải thích đáp án:\nĐổi đơn vị khối lượng: 100 g = 0,1 kg\nĐộng năng ban đầu:\nWđ = 1/2.m.v² = 1/2.0,1.4² = 0,8 J\nThế năng ban đầu:\nWt = m.g.h = 0,1.10.1 = 1 J\nCơ năng của vật là:\nW = Wđ + Wt = 0,8 + 1 = 1,8 J' },
        { id: "L2_Q7", level: 2, question_set: "LEVEL_2", tags: ["tính_toán", "bảo_toàn"], type: 'choice', topic: 'Bảo toàn cơ năng', question: 'Một vật có khối lượng 500 g được thả rơi tự do từ độ cao 30 m so với mặt đất. Lấy g = 10 m/s², bỏ qua lực cản không khí. Khi động năng của vật bằng 75 J, thế năng của vật bằng bao nhiêu?', options: ['150 J', '100 J', '75 J', '50 J'], correct_answer: 2, hint1: '💡 Gợi ý: Em hãy tính cơ năng ban đầu của vật tại độ cao 30 m. Khi biết động năng, em có thể tìm thế năng bằng cách lấy cơ năng trừ động năng.', hint2: 'Cơ năng W = m.g.h = 0.5 * 10 * 30 = 150 J. Sau đó lấy 150 - 75.', explanation: 'Đáp án đúng là:\nC. 75 J.\n📘 Giải thích đáp án:\nĐổi đơn vị khối lượng: 500 g = 0,5 kg\nVì vật được thả rơi từ trạng thái nghỉ nên cơ năng ban đầu bằng thế năng tại độ cao 30 m.\nW = m.g.h = 0,5.10.30 = 150 J\nKhi động năng bằng 75 J:\nW = Wđ + Wt -> Wt = W - Wđ = 150 - 75 = 75 J' },
        { id: "L2_Q8", level: 2, question_set: "LEVEL_2", tags: ["tính_toán", "động_năng"], type: 'fillin', unit: 'J', topic: 'Chuyển hóa năng lượng', question: 'Một vật có khối lượng 500 g được thả rơi tự do từ trạng thái nghỉ. Bỏ qua lực cản không khí. Lấy g = 10 m/s². Sau khi vật rơi được 60 m, động năng của vật bằng bao nhiêu?', answer: '300', hint1: '💡 Gợi ý: Khi vật rơi tự do từ trạng thái nghỉ, phần thế năng giảm đi chuyển hóa thành động năng. Em hãy dùng quãng đường vật đã rơi để tính phần thế năng giảm.', hint2: 'Wđ = Độ giảm thế năng = m*g*s = 0.5 * 10 * 60.', explanation: 'Đáp án đúng là:\n300 J.\n📘 Giải thích đáp án:\nĐổi đơn vị khối lượng: 500 g = 0,5 kg\nKhi vật rơi tự do, phần thế năng giảm đi chuyển hóa thành động năng.\nVật đã rơi được: s = 60 m\nĐộng năng sau khi rơi được 60 m là:\nWđ = m.g.s = 0,5.10.60 = 300 J' },
    { id: "L2_Q9", level: 2, question_set: "LEVEL_2", tags: ["tính_toán", "tỉ_lệ"], type: 'fillin', unit: 'cm', topic: 'Tỉ lệ năng lượng', question: 'Một vật được thả rơi tự do không vận tốc đầu từ độ cao 40 cm so với mặt đất. Chọn mốc thế năng tại mặt đất. Bỏ qua lực cản không khí. Ở độ cao nào (tính bằng cm) thì thế năng của vật bằng 3 lần động năng của vật?', answer: '30', hint1: '💡 Gợi ý: Cơ năng ban đầu tương ứng với độ cao 40 cm. Nếu thế năng bằng 3 lần động năng, hãy chia tổng cơ năng thành các phần tương ứng.', hint2: 'Thế năng chiếm 3 phần, động năng chiếm 1 phần -> Thế năng bằng 3/4 cơ năng.', explanation: 'Đáp án đúng là:\n30 cm.\n📘 Giải thích đáp án:\nCơ năng ban đầu tương ứng với độ cao 40 cm.\nTheo đề bài, thế năng bằng 3 lần động năng.\nKhi đó, thế năng chiếm 3 phần và động năng chiếm 1 phần. Tổng cơ năng gồm 4 phần.\nVì thế năng chiếm 3/4 cơ năng nên độ cao cần chọn là:\nh = 3/4.40 = 30 cm' },

    let currentQ = 0, score = 0, attempts = 0, correctFirst = 0, timer = 0, timerInterval;

    let topicScores = {};
    let leaderboardData = [];
    let playerName = '';
    let answerLog = []; 
    let gameState = { completed_level: null, answered_count: 0, current_level: 0 };
    let sortingAnswers = {};
    let currentQuestionSet = LEVEL_0_QUESTIONS;

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const el = document.getElementById(id);
        el.classList.add('active');
        el.classList.remove('fade-in');
        void el.offsetWidth;
        el.classList.add('fade-in');
    }

    function startGame() {
        playerName = document.getElementById('player-name-input').value.trim() || 'Người chơi';
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        audioCtx.resume();
        currentQ = 0; score = 0; attempts = 0; correctFirst = 0; timer = 0;
        isQuestionAnswered = false;
        topicScores = {};
        answerLog = [];
        gameState = { completed_level: null, answered_count: 0, current_level: 0 };
        sortingAnswers = {};
        currentQuestionSet = LEVEL_0_QUESTIONS;
        currentQuestionSet.forEach(q => { if (!topicScores[q.topic]) topicScores[q.topic] = { correct: 0, total: 0 }; });
        switchScreen('question-screen');
        startTimer();
        renderQuestion();
        lucide.createIcons();
    }

    function startTimer() {
        clearInterval(timerInterval);
        timerInterval = setInterval(() => { timer++; document.getElementById('timer-text').textContent = Math.floor(timer/60) + ':' + String(timer%60).padStart(2,'0'); }, 1000);
    }

    function renderQuestion() {
        isQuestionAnswered = false;
        const q = currentQuestionSet[currentQ];
        attempts = 0;
        currentDragDropAttempt = 0;

        // 1. Cập nhật bộ đếm và thanh tiến trình
        const counterEl = document.getElementById('q-counter');
        const progressEl = document.getElementById('progress-bar');
        if (counterEl) counterEl.textContent = `Câu ${currentQ + 1}/${currentQuestionSet.length}`;
        if (progressEl) progressEl.style.width = `${((currentQ) / currentQuestionSet.length) * 100}%`;

        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('next-btn').classList.add('hidden');
        const area = document.getElementById('question-area');

        // 2. Phân loại câu hỏi để render
        if (q.type === 'choice') {
            area.innerHTML = `
                <p class="text-lg font-medium text-gray-700 mb-6">${q.question}</p>
                <div class="space-y-3">
                    ${q.options.map((opt, i) => `
                        <button onclick="checkChoice(${i})" class="w-full text-left p-4 rounded-xl border-2 border-gray-200 hover:border-orange-400 hover:bg-orange-50 transition-all font-medium text-gray-700">
                            ${String.fromCharCode(65 + i)}. ${opt}
                        </button>
                    `).join('')}
                </div>`;

        } else if (q.type === 'fillin') {
            // TỰ ĐỘNG THÊM ĐƠN VỊ NẾU CÓ
            const unitDisplay = q.unit ? `<span class="ml-2 font-bold text-gray-700 text-lg">${q.unit}</span>` : '';
            
            if (Array.isArray(q.answer)) {
                const questionParts = q.question.split('[___]');
                let questionHTML = questionParts[0];
                for (let i = 1; i < questionParts.length; i++) {
                    questionHTML += `<input class="fill-input-multi w-24 px-3 py-2 mx-1 rounded-lg border-2 border-orange-400 focus:border-orange-600 outline-none text-lg text-center" placeholder="...">` + questionParts[i];
                }
                area.innerHTML = `
                    <p class="text-lg font-medium text-gray-700 mb-6">${questionHTML}</p>
                    <button onclick="checkFillIn()" class="w-full px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-orange-400 to-red-400 hover:scale-105 transition-all">Trả lời</button>`;
            } else {
                area.innerHTML = `
                    <p class="text-lg font-medium text-gray-700 mb-6">${q.question.replace(/\[___\]/g, '<span class="inline-block border-b-2 border-orange-400 px-2 mx-1">[___]</span>')}</p>
                    <div class="flex items-center gap-3">
                        <input id="fill-input" class="flex-1 px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-orange-400 outline-none text-lg" placeholder="Nhập đáp án...">
                        ${unitDisplay}
                        <button onclick="checkFillIn()" class="px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-orange-400 to-red-400 hover:scale-105 transition-all">Trả lời</button>
                    </div>`;
            }

        } else if (q.type === 'sorting') {
            area.innerHTML = `
                <p class="text-lg font-medium text-gray-700 mb-6">${q.question}</p>
                <div class="space-y-3">
                    ${q.statements.map((stmt, i) => `
                        <div class="p-4 rounded-xl bg-gray-50 border-2 border-gray-200">
                            <p class="font-medium text-gray-700 mb-3">${i + 1}. ${stmt}</p>
                            <div class="flex gap-3">
                                <button onclick="setSortingAnswer(${i}, true)" class="sorting-btn flex-1 px-4 py-2 rounded-lg font-bold text-green-700 bg-green-100 border-2 border-green-200 hover:bg-green-200 transition-all" data-answer="${i}" data-value="true">Đúng ✓</button>
                                <button onclick="setSortingAnswer(${i}, false)" class="sorting-btn flex-1 px-4 py-2 rounded-lg font-bold text-red-700 bg-red-100 border-2 border-red-200 hover:bg-red-200 transition-all" data-answer="${i}" data-value="false">Sai ✗</button>
                            </div>
                        </div>
                    `).join('')}
                    <button onclick="checkSorting()" class="mt-4 w-full px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-orange-400 to-red-400 hover:scale-105 transition-all">Kiểm tra</button>
                </div>`;

        } else if (q.type === 'dragdrop') {
            const shuffled = [...q.pairs.map(p => p[1])].sort(() => Math.random() - 0.5);
            area.innerHTML = `
                <p class="text-lg font-medium text-gray-700 mb-4">${q.question}</p>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-3">
                        ${q.pairs.map((p, i) => `
                            <div class="p-3 rounded-xl bg-orange-50 font-medium">
                                ${p[0]} 
                                <span class="drop-zone inline-block ml-2 min-w-[100px] border-2 border-dashed border-orange-300 rounded-lg px-3 py-1 text-center text-sm text-gray-400 cursor-pointer" 
                                      data-idx="${i}" 
                                      onclick="removeDrop(this)" 
                                      ondragover="event.preventDefault(); this.classList.add('drag-over')" 
                                      ondragleave="this.classList.remove('drag-over')" 
                                      ondrop="handleDrop(event, ${i})">kéo vào đây</span>
                            </div>
                        `).join('')}
                    </div>
                    <div class="space-y-3" id="drag-items">
                        ${shuffled.map(s => `
                            <div class="drag-item p-3 rounded-xl bg-orange-100 border-2 border-orange-300 font-medium text-center cursor-grab" 
                                 draggable="true" 
                                 ondragstart="event.dataTransfer.setData('text', this.textContent); this.classList.add('dragging')" 
                                 ondragend="this.classList.remove('dragging')" 
                                 style="background: #fed7aa">${s}</div>
                        `).join('')}
                    </div>
                </div>
                <button onclick="checkDragDrop()" class="mt-4 w-full px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-orange-400 to-red-400 hover:scale-105 transition-all">Kiểm tra</button>
            `;
            saveDragDropState();

        } else if (q.type === 'slider') {
            area.innerHTML = `
                <p class="text-lg font-medium text-gray-700 mb-6">${q.question}</p>
                <div class="space-y-4">
                    <input id="slider-input" type="range" min="${q.min}" max="${q.max}" step="${q.step}" value="${q.min}" class="w-full h-2 rounded-lg appearance-none bg-gradient-to-r from-orange-200 to-red-200 outline-none" oninput="updateSliderDisplay()">
                    <div class="text-center">
                        <span id="slider-display" class="text-3xl font-bold text-orange-600">${q.min}</span>
                        <span class="text-lg font-medium text-gray-600 ml-2">${q.unit}</span>
                    </div>
                    <button onclick="checkSlider()" class="w-full px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-orange-400 to-red-400 hover:scale-105 transition-all">Kiểm tra</button>
                </div>`;
        }
        lucide.createIcons();
    }

    function updateSliderDisplay() {
        const val = document.getElementById('slider-input').value;
        document.getElementById('slider-display').textContent = val;
    }

    function saveDragDropState() {
        const zones = document.querySelectorAll('.drop-zone');
        const items = document.getElementById('drag-items');
        dragDropInitialState = {
            zones: Array.from(zones).map(z => z.textContent),
            items: Array.from(items.children).map(item => ({
                text: item.textContent,
                html: item.outerHTML
            }))
        };
    }

    function resetDragDrop() {
        if (!dragDropInitialState) return;
        const zones = document.querySelectorAll('.drop-zone');
        const dragItemsContainer = document.getElementById('drag-items');
        
        zones.forEach((z, i) => {
            z.textContent = dragDropInitialState.zones[i];
            z.classList.remove('bg-orange-100', 'drag-over');
        });
        
        dragItemsContainer.innerHTML = '';
        dragDropInitialState.items.forEach(itemData => {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = itemData.html;
            const newItem = tempDiv.firstElementChild;
            newItem.addEventListener('dragstart', function(e) {
                e.dataTransfer.setData('text', this.textContent);
                this.classList.add('dragging');
            });
            newItem.addEventListener('dragend', function() {
                this.classList.remove('dragging');
            });
            dragItemsContainer.appendChild(newItem);
        });
    }

    function handleDrop(e, idx) {
        e.preventDefault();
        const zone = e.target.closest('.drop-zone');
        if (!zone) return; 
        const text = e.dataTransfer.getData('text');
        
        // Nếu ô đã có chữ, gỡ chữ cũ ra trước
        if (zone.textContent !== "kéo vào đây") {
            removeDrop(zone);
        }

        zone.textContent = text;
        zone.classList.remove('drag-over');
        zone.classList.add('bg-orange-100');
        const items = document.getElementById('drag-items');
        [...items.children].forEach(c => { if(c.textContent === text) c.style.display = 'none'; });
    }

   function removeDrop(el) {
        if (el.textContent === "kéo vào đây") return;
        const text = el.textContent;
        const dragItemsContainer = document.getElementById('drag-items');
        const originalItems = dragItemsContainer.children;
        for (let item of originalItems) {
            if (item.textContent === text) {
                item.style.display = 'block';
            }
        }
        el.textContent = "kéo vào đây";
        el.classList.remove('bg-orange-100');
    }

    function getHintDetail() {
        const totalAnswered = Object.values(topicScores).reduce((a,t) => a + t.total, 0);
        const totalCorrect = Object.values(topicScores).reduce((a,t) => a + t.correct, 0);
        if (totalAnswered < 2) return 'normal';
        return (totalCorrect / totalAnswered) < 0.5 ? 'detailed' : 'normal';
    }

    function showFeedback(correct, msg, isLevel1 = false) {
        const fb = document.getElementById('feedback-area');
        fb.classList.remove('hidden');
        if (correct) {
            fb.className = 'rounded-xl p-4 mb-4 bg-green-50 border-2 border-green-200 hint-box';
            const formattedMsg = msg.split('\n').map(l=>l.trim()).filter(l=>l.length>0).join('<br>');
            fb.innerHTML = `<p class="font-bold text-green-700 mb-3">🎉 TUYỆT VỜI! EM ĐÃ TRẢ LỜI ĐÚNG RỒI</p><p class="text-green-600 text-sm whitespace-pre-wrap">${formattedMsg}</p>`;
            correctSound();
            
            // 🔥 BÉ LÔI BẮN PHÁO HOA NÈ!
            if (typeof confetti === 'function') {
                confetti({
                    particleCount: 150, 
                    spread: 80,         
                    origin: { y: 0.6 }, 
                    colors: ['#f97316', '#fbbf24', '#34d399', '#60a5fa', '#a78bfa'],
                    zIndex: 9999
                });
            }

            document.getElementById('question-area').classList.add('bounce');
            setTimeout(() => document.getElementById('question-area').classList.remove('bounce'), 400);
        } else {
            fb.className = 'rounded-xl p-4 mb-4 bg-amber-50 border-2 border-amber-200 hint-box';
            fb.innerHTML = `<p class="font-bold text-red-600 mb-1">✗ Em còn 1 cơ hội cuối cùng nhé!</p><p class="text-amber-600 text-sm">${msg}</p>`;
            wrongSound();
            document.getElementById('question-area').classList.add('shake');
            setTimeout(() => document.getElementById('question-area').classList.remove('shake'), 400);
        }
        lucide.createIcons();
    }

    function showAnswer(msg) {
        const fb = document.getElementById('feedback-area');
        fb.classList.remove('hidden');
        fb.className = 'rounded-xl p-4 mb-4 bg-red-50 border-2 border-red-200 hint-box';
        const parts = msg.split('📘');
        const answerPart = parts[0].trim().split('\n').map(s=>s.trim()).filter(s=>s.length>0).join('<br>');
        const explanationPart = (parts[1]||'').split('\n').map(s=>s.trim()).filter(s=>s.length>0).join('<br>');
        fb.innerHTML = `<p class="font-bold text-red-700 mb-3">😢 Em đã hết lượt trả lời rồi!</p><p class="text-red-600 text-sm mb-3">${answerPart}</p><p class="text-red-600 text-sm whitespace-pre-line">📘 ${explanationPart.replace(/<br>/g, '\n')}</p>`;
        wrongSound();
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function recordAnswer(correct, userAnswer) {
        const q = currentQuestionSet[currentQ];
        topicScores[q.topic].total++;
        if (correct) topicScores[q.topic].correct++;
        gameState.answered_count++;
        answerLog.push({
            qIdx: currentQ,
            id: q.id,
            level: q.level,
            question_set: q.question_set,
            question: q.question,
            topic: q.topic,
            tags: q.tags,
            type: q.type,
            userAnswer: userAnswer,
            correct: correct
        });
    }

    function setSortingAnswer(idx, val) {
        sortingAnswers[idx] = val;
        const buttons = document.querySelectorAll(`button[data-answer="${idx}"]`);
        buttons.forEach(btn => {
            btn.classList.remove('active-true', 'active-false');
            if (btn.dataset.value === 'true' && val === true) btn.classList.add('active-true');
            else if (btn.dataset.value === 'false' && val === false) btn.classList.add('active-false');
        });
    }

    function checkChoice(idx) {
        if (isQuestionAnswered) return;
        const q = currentQuestionSet[currentQ];
        attempts++;
        const isLevel1 = gameState.current_level === 1;
        
        if (idx === q.correct_answer) {
            isQuestionAnswered = true;
            score += attempts === 1 ? 10 : 5;
            if (attempts === 1) correctFirst++;
            recordAnswer(true, idx);
            showFeedback(true, q.explanation);
            document.getElementById('next-btn').classList.remove('hidden');
        } else if (attempts === 1) {
            if (isLevel1) {
                showFeedback(false, q.hint1, true);
                setTimeout(() => {
                    const area = document.getElementById('question-area');
                    area.innerHTML = `<p class="text-lg font-medium text-gray-700 mb-6">${q.question}</p>
                    <div class="space-y-3">${q.options.map((opt, i) => `<button onclick="checkChoice(${i})" class="w-full text-left p-4 rounded-xl border-2 border-gray-200 hover:border-orange-400 hover:bg-orange-50 transition-all font-medium text-gray-700">${String.fromCharCode(65+i)}. ${opt}</button>`).join('')}</div>`;
                }, 100);
            } else {
                showFeedback(false, getHintDetail() === 'detailed' ? q.hint2 : q.hint1);
            }
        } else {
            isQuestionAnswered = true;
            recordAnswer(false, idx);
            showAnswer(q.explanation);
        }
    }

    function checkSorting() {
        if (isQuestionAnswered) return;
        const q = currentQuestionSet[currentQ];
        attempts++;
        const isLevel1 = gameState.current_level === 1;
        
        let allCorrect = true;
        for (let i = 0; i < q.answers.length; i++) {
            if (sortingAnswers[i] !== q.answers[i]) allCorrect = false;
        }
        
        if (allCorrect) {
            isQuestionAnswered = true;
            score += attempts === 1 ? 10 : 5;
            if (attempts === 1) correctFirst++;
            recordAnswer(true, {...sortingAnswers});
            showFeedback(true, q.explanation);
            document.getElementById('next-btn').classList.remove('hidden');
        } else if (attempts === 1) {
            if (isLevel1) {
                showFeedback(false, q.hint1, true);
                setTimeout(() => {
                    const area = document.getElementById('question-area');
                    area.innerHTML = `<p class="text-lg font-medium text-gray-700 mb-6">${q.question}</p>
                    <div class="space-y-3">${q.statements.map((stmt, i) => `<div class="p-4 rounded-xl bg-gray-50 border-2 border-gray-200"><p class="font-medium text-gray-700 mb-3">${i+1}. ${stmt}</p>
<div class="flex gap-3"><button onclick="setSortingAnswer(${i}, true)" class="sorting-btn flex-1 px-4 py-2 rounded-lg font-bold text-green-700 bg-green-100 border-2 border-green-200 hover:bg-green-200 transition-all" data-answer="${i}" data-value="true">Đúng ✓</button>
                    <button onclick="setSortingAnswer(${i}, false)" class="sorting-btn flex-1 px-4 py-2 rounded-lg font-bold text-red-700 bg-red-100 border-2 border-red-200 hover:bg-red-200 transition-all" data-answer="${i}" data-value="false">Sai ✗</button></div></div>`).join('')}
                    <button onclick="checkSorting()" class="mt-4 w-full px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-orange-400 to-red-400 hover:scale-105 transition-all">Kiểm tra</button></div>`;
                }, 100);
            } else {
                showFeedback(false, getHintDetail() === 'detailed' ? q.hint2 : q.hint1);
            }
        } else {
            isQuestionAnswered = true;
            recordAnswer(false, {...sortingAnswers});
            showAnswer(q.explanation);
        }
    }

    function checkFillIn() {
        if (isQuestionAnswered) return;
        const q = currentQuestionSet[currentQ];
        attempts++;
        const isLevel1 = gameState.current_level === 1;
        
        let allCorrect = false;
        let userAnswerRecord = '';

        if (Array.isArray(q.answer)) {
            const inputs = document.querySelectorAll('.fill-input-multi');
            const userAnswers = Array.from(inputs).map(inp => inp.value.trim().toLowerCase());
            userAnswerRecord = userAnswers.join(' | ');
            const correctAnswerSets = q.answer.map(ans => ans.split('|').map(a => a.trim().toLowerCase()));
            allCorrect = correctAnswerSets.some(correctSet => correctSet.every((correct, i) => userAnswers[i] === correct));
        } else {
            const val = document.getElementById('fill-input').value.trim().toLowerCase();
            userAnswerRecord = val;
            const answers = q.answer.split('|').map(a => a.trim().toLowerCase());
            allCorrect = answers.includes(val);
        }

        if (allCorrect) {
            isQuestionAnswered = true;
            score += attempts === 1 ? 10 : 5;
            if (attempts === 1) correctFirst++;
            recordAnswer(true, userAnswerRecord);
            showFeedback(true, q.explanation);
            document.getElementById('next-btn').classList.remove('hidden');
        } else if (attempts === 1) {
            if (isLevel1) {
                showFeedback(false, q.hint1, true);
                setTimeout(() => {
                    const area = document.getElementById('question-area');
                    if (Array.isArray(q.answer)) {
                        const questionParts = q.question.split('[___]');
                        let questionHTML = questionParts[0];
                        for (let i = 1; i < questionParts.length; i++) {
                            questionHTML += `<input class="fill-input-multi w-24 px-3 py-2 mx-1 rounded-lg border-2 border-orange-400 focus:border-orange-600 outline-none text-lg text-center" placeholder="...">` + questionParts[i];
                        }
                        area.innerHTML = `<p class="text-lg font-medium text-gray-700 mb-6">${questionHTML}</p>
                        <button onclick="checkFillIn()" class="px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-orange-400 to-red-400 hover:scale-105 transition-all">Trả lời</button>`;
                    } else {
                        area.innerHTML = `<p class="text-lg font-medium text-gray-700 mb-6">${q.question.replace(/\[___\]/g, '<span class="inline-block border-b-2 border-orange-400 px-2 mx-1">[___]</span>')}</p>
                        <div class="flex gap-3"><input id="fill-input" class="flex-1 px-4 py-3 rounded-xl border-2 border-gray-200 focus:border-orange-400 outline-none text-lg" placeholder="Nhập đáp án...">
                        <button onclick="checkFillIn()" class="px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-orange-400 to-red-400 hover:scale-105 transition-all">Trả lời</button></div>`;
                    }
                }, 100);
            } else {
                showFeedback(false, getHintDetail() === 'detailed' ? q.hint2 : q.hint1);
            }
        } else {
            isQuestionAnswered = true;
            recordAnswer(false, userAnswerRecord);
            showAnswer(q.explanation);
        }
    }

    function checkSlider() {
        if (isQuestionAnswered) return;
        const q = currentQuestionSet[currentQ];
        const val = parseInt(document.getElementById('slider-input').value);

            document.getElementById('next-btn').classList.remove('hidden');

            if (isLevel1) {
                showFeedback(false, q.hint1, true);

                    const area = document.getElementById('question-area');

                    <div class="space-y-4"><input id="slider-input" type="range" min="${q.min}" max="${q.max}" step="${q.step}" value="${q.min}" class="w-full h-2 rounded-lg appearance-none bg-gradient-to-r from-orange-200 to-red-200 outline-none" oninput="updateSliderDisplay()">
                    <div class="text-center"><span id="slider-display" class="text-3xl font-bold text-orange-600">${q.min}</span><span class="text-lg font-medium text-gray-600 ml-2">${q.unit}</span></div>
                    <button onclick="checkSlider()" class="w-full px-6 py-3 rounded-xl font-bold text-white bg-gradient-to-r from-orange-400 to-red-400 hover:scale-105 transition-all">Kiểm tra</button></div>`;
                }, 100);
            } else {
                showFeedback(false, getHintDetail() === 'detailed' ? q.hint2 : q.hint1);
            }
        } else {
            isQuestionAnswered = true;
            recordAnswer(false, val);
            showAnswer(q.explanation);
        }
    }

    function checkDragDrop() {
        if (isQuestionAnswered) return;
        const q = currentQuestionSet[currentQ];
        const zones = document.querySelectorAll('.drop-zone');
        let allCorrect = true;
        const userMatches = [];
        zones.forEach((z, i) => { const text = z.textContent.trim(); userMatches.push(text); if (text !== q.pairs[i][1]) allCorrect = false; });
        
        attempts++;
        const isLevel1 = gameState.current_level === 1;
        
        if (allCorrect) {
            isQuestionAnswered = true;
            score += attempts === 1 ? 10 : 5;
            if (attempts === 1) correctFirst++;
            recordAnswer(true, userMatches);
            showFeedback(true, q.explanation);
            document.getElementById('next-btn').classList.remove('hidden');
            currentDragDropAttempt = 0;
        } else {
            currentDragDropAttempt++;
            if (currentDragDropAttempt === 1) {
                if (isLevel1) {
                    showFeedback(false, q.hint1, true);
                } else {
                    showFeedback(false, getHintDetail() === 'detailed' ? q.hint2 : q.hint1);
                }
                setTimeout(() => { resetDragDrop(); }, 600);

        `Em cần chú ý hơn đến cách phân tích sự chuyển hóa giữa động năng, thế năng và cơ năng.`,
        `Em nên rèn thêm cách đọc dữ kiện, xác định công thức và kiểm tra điều kiện áp dụng.`
    ],
    '8': (tag1) => [
        `<strong>${tag1.name}</strong>: Em nên tối ưu hóa thời gian và cẩn thận với các bẫy nhỏ khi ${tag1.explanation.charAt(0).toLowerCase() + tag1.explanation.slice(1)}`
    ],
    '9': (tag1) => [
        `<strong>${tag1.name}</strong>: Em cần duy trì phong độ và luyện thêm kỹ năng xử lý các tình huống phức tạp liên quan đến việc ${tag1.explanation.charAt(0).toLowerCase() + tag1.explanation.slice(1)}`
    ]
};

    function getLevelTagsData(level, entry) {
    // 1. Xử lý riêng cho Level 0 theo cấu trúc ID (0, 1, 2...)
    if (level === 0 && LEVEL_0_TAGS_DATA[entry.qIdx]) {
        return LEVEL_0_TAGS_DATA[entry.qIdx];
    }

    // 2. Xử lý cho Level 1, 2, 3 theo cấu trúc mã L(n)_Cxx
    // Tách chuỗi và tự động thêm số 0 để "L3_Q1" chuyển thành "L3_C01" chuẩn chỉnh
    const parts = entry.id.split('_Q');
    const tagKey = parts[0] + '_C' + parts[1].padStart(2, '0');
    
    if (LEVEL_TAGS_DATA[tagKey]) {
        return LEVEL_TAGS_DATA[tagKey];
    }

    // 3. Fallback: Nếu không tìm thấy Tag (trường hợp dự phòng)
    return { 
        name: entry.topic, 
        explanation: "nội dung về " + entry.topic.toLowerCase() 
    };
}

    function generateStrengthFeedback(levelResults, level, correctCount, total) {    
    const feedbackHeader = "🌟 ";
    const sortedCorrect = [...levelResults.filter(e => e.correct)].sort((a, b) => b.qIdx - a.qIdx);

    if (correctCount === 0) {
        return feedbackHeader + "Cố gắng lên nhé, khởi đầu sẽ hơi khó khăn một chút thôi!";
    }

    // Nếu đạt điểm tuyệt đối, gọi thẳng template '10'
    if (correctCount === total) {
        if (typeof confetti === 'function') confetti();
        const templates = STRENGTH_TEMPLATES['10'];
        const feedbackItems = templates(level); // Truyền level vào để chọn câu phù hợp
        const feedbackList = feedbackItems.map(item => `* ${item}`).join('<br>');
        return feedbackHeader + `Xuất sắc! Em đã đạt điểm tuyệt đối Level ${level}.<br>` + feedbackList;
    }

    // Nếu chưa đạt điểm tuyệt đối, dùng các template từ 1 đến 9
    let templateKey = correctCount.toString();
    // Giới hạn templateKey tối đa là 9 nếu số câu đúng > 9 nhưng chưa bằng tổng số câu
    if (correctCount > 9) templateKey = '9';

    // Phân bổ số thẻ hiển thị (maxTags) theo kịch bản:
    let maxTags = 1;
    if (templateKey === '2' || templateKey === '3') maxTags = 2;
    else if (templateKey >= '4' && templateKey <= '8') maxTags = 3;
    else if (templateKey === '9') maxTags = 4;

    const selectedTagsData = sortedCorrect.slice(0, maxTags).map(entry => getLevelTagsData(level, entry));

    const templates = STRENGTH_TEMPLATES[templateKey];
    
    if (templates) {
        // Truyền thêm level vào cho template '1' (các template khác sẽ bỏ qua tham số thừa này)
        const feedbackItems = templates(...selectedTagsData, level);
        const feedbackList = feedbackItems.map(item => `* ${item}`).join('<br>');
        
        return feedbackHeader + "<br>" + feedbackList;
    }

    return feedbackHeader + `Em đã đạt được ${correctCount}/${total} điểm.`;
}
    function generateImproveFeedback(levelResults, level) {
        const wrongEntries = levelResults.filter(e => !e.correct);
        const incorrectCount = wrongEntries.length;

        if (incorrectCount === 0) {
            return `Em chưa có nội dung cần cải thiện nổi bật ở Level ${level}. Em có thể tiếp tục chuyển sang thử thách tiếp theo.`;
        }
        
        if (incorrectCount === 10) {
            return `Em cần củng cố lại các kiến thức nền tảng của Level ${level}, đặc biệt là khái niệm cơ năng, động năng, thế năng và điều kiện bảo toàn cơ năng. Em nên học lại từng phần nhỏ, làm lại các câu cơ bản và chú ý mối liên hệ giữa động năng, thế năng và cơ năng. Kết quả này giúp em xác định rõ những nội dung cần rèn luyện trước khi chuyển sang Level tiếp theo.`;
        }

        const sortedWrong = wrongEntries.sort((a, b) => b.qIdx - a.qIdx);
        
        let maxTagsForData = 2;
        let templateKey = '2';

        if (incorrectCount === 1) { maxTagsForData = 1; templateKey = '1'; }
        else if (incorrectCount === 2) { maxTagsForData = 2; templateKey = '2'; }
        else if (incorrectCount === 3) { maxTagsForData = 2; templateKey = '3'; }
        else if (incorrectCount === 4) { maxTagsForData = 3; templateKey = '4'; }
        else if (incorrectCount >= 5 && incorrectCount <= 6) { maxTagsForData = 2; templateKey = '5'; }
        else if (incorrectCount >= 7 && incorrectCount <= 9) { maxTagsForData = 2; templateKey = '7'; }

        const selectedTagsData = sortedWrong.slice(0, maxTagsForData).map(entry => getLevelTagsData(level, entry));
        const templates = IMPROVE_TEMPLATES[templateKey];
        
        if (templates) {
            const feedbackItems = templates(...selectedTagsData);
            return feedbackItems.map(item => `* ${item}`).join('<br>');
        }
        
        const wrongTagsNames = selectedTagsData.map(data => `<strong>${data.name}</strong>`).join(', ');
        return `Để tiến bộ hơn, em cần chú ý luyện thêm các dạng bài liên quan đến: ${wrongTagsNames}.`;
    }

    function generateNextLevelRecommendation(correctCount, total) {
        const lvl = gameState.current_level; 
        const passRatio = correctCount / total;
        const isPassed = passRatio >= 0.5; // Đúng từ 50% trở lên mới được qua màn

        if (lvl === 0) {
            if (correctCount <= 4) return { action: startLevel1, guidance:'Em hãy bắt đầu từ những kiến thức và bài tập cơ bản nhất ở Level 1 nhé.', levelName:'📚 Bộ luyện tập Level 1', description:'Củng cố công thức và tính toán', buttonText:'Luyện tập Level 1' };
            else if (correctCount <= 7) return { action: startLevel2, guidance:'Nền tảng của em khá ổn! Hãy tiếp tục rèn luyện ở mức độ vận dụng tại Level 2.', levelName:'⚙️ Bộ luyện tập Level 2', description:'Vận dụng cơ năng trong các tình huống vật lí', buttonText:'Luyện tập Level 2' };
            else return { action: startLevel3, guidance:'Tuyệt đỉnh! Nền tảng của em rất vững chắc, hãy thử sức ngay với các câu hỏi khó ở Level 3 nhé.', levelName:'🚀 Bộ luyện tập Level 3', description:'Thử thách bảo toàn cơ năng và phân tích hiện tượng', buttonText:'Luyện tập Level 3' };
        } else if (lvl === 1) {
            if (!isPassed) return { action: startLevel1, guidance:'Em cần làm quen thêm với các công thức cơ bản. Hãy thử lại Level 1 nhé.', levelName:'🔄 Luyện lại Level 1', description:'Rèn luyện kỹ năng tính toán', buttonText:'Chơi lại Level 1' };
            else return { action: startLevel2, guidance:'Em đã nắm được nhiều kiến thức cơ bản. Hãy tiếp tục luyện tập để tăng khả năng vận dụng.', levelName:'⚙️ Bộ luyện tập Level 2', description:'Vận dụng cơ năng trong các tình huống vật lí', buttonText:'Luyện tập Level 2' };
        } else if (lvl === 2) {
            if (!isPassed) return { action: startLevel2, guidance:'Các tình huống ở Level 2 khá đa dạng, em nên rèn luyện thêm lần nữa nhé.', levelName:'🔄 Luyện lại Level 2', description:'Phân tích hiện tượng', buttonText:'Chơi lại Level 2' };
            else return { action: startLevel3, guidance:'Tuyệt vời! Em có nền tảng khá tốt. Hãy thử sức với các câu hỏi vận dụng cao hơn.', levelName:'🚀 Bộ luyện tập Level 3', description:'Thử thách bảo toàn cơ năng và phân tích hiện tượng', buttonText:'Luyện tập Level 3' };
        } else {
            if (!isPassed) return { action: startLevel3, guidance:'Level 3 là thử thách khó, em đừng nản chí mà hãy thử lại nhé!', levelName:'🔄 Luyện lại Level 3', description:'Chinh phục vận dụng cao', buttonText:'Chơi lại Level 3' };
            else return { action: restartGame, guidance:'Chúc mừng em đã hoàn thành toàn bộ thử thách! Cô tự hào về em lắm!', levelName:'🎉 Hoàn thành xuất sắc', description:'Em đã chinh phục mọi cấp độ.', buttonText:'Về màn hình chính' };
        }
    }

   function nextQuestion() {
        currentQ++;
        if (currentQ >= currentQuestionSet.length) {
            gameState.completed_level = gameState.current_level;
            endGame(); // Đã sửa lỗi thiếu tên hàm
        } else {
            renderQuestion();
        }
    }

    async function endGame() {
        clearInterval(timerInterval);
        document.getElementById('progress-bar').style.width = '100%';
        if (gameState.completed_level === null || gameState.answered_count < currentQuestionSet.length) return;

        const levelNames = ["Level 0", "Level 1", "Level 2", "Level 3"];
        document.querySelector("#result-screen h2").textContent = "Hoàn thành " + levelNames[gameState.current_level] + "!";
        
        const levelResults = answerLog.filter(a => a.level === gameState.current_level);
        const correctCount = levelResults.filter(a => a.correct).length;
        const total = currentQuestionSet.length;
        const accuracy = Math.round((correctCount / total) * 100);

        switchScreen('result-screen');
        document.getElementById('score-display').textContent = `${correctCount}/${total}`;
        document.getElementById('accuracy-display').textContent = `${accuracy}%`;
        
        document.getElementById('strength-content').innerHTML = generateStrengthFeedback(levelResults, gameState.current_level, correctCount, total);
        document.getElementById('improve-content').innerHTML = generateImproveFeedback(levelResults, gameState.current_level);

        const nextLevelData = generateNextLevelRecommendation(correctCount, total);
        document.getElementById('next-level-guidance').textContent = nextLevelData.guidance;
        document.getElementById('next-level-name').textContent = nextLevelData.levelName;
        document.getElementById('next-level-description').textContent = nextLevelData.description;
        const nextBtn = document.getElementById('next-level-btn');
        nextBtn.textContent = `▶ ${nextLevelData.buttonText}`;
        nextBtn.onclick = nextLevelData.action;

        // Lưu Firebase (Đã gộp thành 1 lần duy nhất)
        const strengths = []; const weaknesses = [];
        for (const [topic, s] of Object.entries(topicScores)) {
            if (s.total > 0) {
                if (s.correct / s.total >= 0.7) strengths.push(topic); 
                else weaknesses.push(topic);
            }
        }
        
        const qrArr = currentQuestionSet.map(q => {
            const found = levelResults.find(r => r.id === q.id);
            return found ? found.correct : false;
        });

        if (typeof window.dataSdk !== 'undefined') {
            await window.dataSdk.create({
                player_name: playerName,
                score: correctCount,
                completion_time_seconds: timer, // Dùng tên này cho thống nhất
                level_id: gameState.current_level,
                question_results: qrArr,
                strengths: strengths.join(', '),
                weaknesses: weaknesses.join(', '),
                submitted_at: new Date().toISOString()
            });
        }
    }
    function toggleReviewDetail(idx) {
        const levelResults = answerLog.filter(a => a.level === gameState.current_level);
        const entry = levelResults[idx];
        const q = currentQuestionSet[entry.qIdx];
        
        const reviewList = document.getElementById('review-list');
        const existing = reviewList.querySelector(`[data-detail-idx="${idx}"]`);
        
        if (existing) { 
            existing.remove(); 
            return; 
        }
        
        reviewList.querySelectorAll('[data-detail-idx]').forEach(el => el.remove());
        
        const div = document.createElement('div');
        div.setAttribute('data-detail-idx', idx);
        div.className = 'mt-2 p-4 bg-blue-50 rounded-lg border border-blue-200 text-sm text-gray-700';
        
        let html = `<p class="font-bold mb-2">Câu hỏi: ${q.question}</p>`;
        
        if (entry.correct) { 
            html += `<p class="text-green-700 font-semibold">✓ Em đã trả lời đúng!</p>`; 
        } else { 
            html += `<p class="text-red-700 font-semibold mb-2">✗ Em đã chọn sai. Đáp án đúng là:</p>`;
            html += `<p class="text-gray-600 italic border-l-2 border-red-300 pl-2 whitespace-pre-line">${q.explanation}</p>`;
        }
        
        div.innerHTML = html;
        
        const buttons = reviewList.querySelectorAll('button');
        if (buttons[idx]) {
            reviewList.insertBefore(div, buttons[idx].nextSibling);
        } else {
            reviewList.appendChild(div);
        }
    }

    function showLeaderboard() { switchScreen('leaderboard-screen'); renderLeaderboard(); }
    function showLeaderboardFromStart() { switchScreen('leaderboard-screen'); renderLeaderboard(); }
    
    function renderLeaderboard() {
        const list = document.getElementById('lb-list');
        list.innerHTML = '';
        
        // Render top 10
        leaderboardData.slice(0, 10).forEach((entry, i) => {
            const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i + 1}`;
            const row = document.createElement('div');
            row.className = 'lb-row flex items-center justify-between p-4 rounded-xl bg-white shadow-sm border border-orange-100';
            row.style.animationDelay = `${i * 0.08}s`;
            row.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="text-xl">${medal}</span>
                    <span class="font-bold text-gray-700">${entry.player_name}</span>
                </div>
                <div class="text-right">
                    <span class="font-bold text-orange-600">${entry.score} điểm</span>
                    <span class="text-gray-400 text-sm ml-2">${Math.floor(entry.completion_time / 60)}:${String(entry.completion_time % 60).padStart(2, '0')}</span>
                </div>`;
            list.appendChild(row);
        });

        // THÊM NÚT BẤM DẪN QUA TRANG THỐNG KÊ
        const statsBtn = document.createElement('button');
        statsBtn.className = 'mt-6 w-full px-6 py-3 rounded-xl font-bold text-white bg-indigo-600 shadow-md hover:shadow-lg transition-all hover:scale-[1.02] flex items-center justify-center gap-2';
        statsBtn.innerHTML = '<i data-lucide="bar-chart-3" style="width:20px;height:20px"></i> 📊 Xem trang thống kê chi tiết';
        statsBtn.onclick = () => window.location.href = 'thongke.html';
        list.appendChild(statsBtn);
        
        // Refresh lại icon Lucide để nó hiện icon chart
        lucide.createIcons();
    }
    function startLevel(levelNum, questionSet) {
        answerLog = []; 
        topicScores = {}; 
        currentQ = 0; attempts = 0; correctFirst = 0; timer = 0; isQuestionAnswered = false;
        gameState = { completed_level: null, answered_count: 0, current_level: levelNum };
        sortingAnswers = {};
        currentQuestionSet = questionSet;
        topicScores = {};
        currentQuestionSet.forEach(q => { if (!topicScores[q.topic]) topicScores[q.topic] = { correct: 0, total: 0 }; });
        switchScreen('question-screen');
        startTimer();
        renderQuestion();
        lucide.createIcons();
    }

    function restartGame() { switchScreen('start-screen'); }

    document.addEventListener('DOMContentLoaded', () => { lucide.createIcons(); });
  </script>
