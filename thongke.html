*{font-family:'DM Sans',sans-serif;box-sizing:border-box}
:root{--pastel-blue:#a8d8ea;--pastel-mint:#b8e6d0;--pastel-pink:#f4b8c8;--pastel-lavender:#c3b1e1;--pastel-yellow:#fde8a0;--bg-main:#f0f4ff;--card:#ffffff;--text-dark:#2d3250;--text-mid:#5c6180;--correct:#4ade80;--wrong:#f87171;--vh-unit:min(var(--vh,1vh),1vh)}
body{margin:0;background:var(--bg-main);color:var(--text-dark);overflow-x:hidden}
.screen{display:none;min-height:calc(100*var(--vh-unit));width:100%}
.screen.active{display:flex;flex-direction:column}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{transform:scale(.8);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(-60px) rotate(720deg);opacity:0}}
@keyframes burst{0%{transform:scale(0);opacity:1}100%{transform:scale(1);opacity:0}}
.fireworks-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998}
.firework{position:absolute;font-size:2rem;animation:burst 0.8s ease-out forwards;will-change:transform,opacity}
.pop-in{animation:popIn .4s ease}
.shake{animation:shake .4s ease}
.stagger>*{animation:slideUp .4s ease both}
.stagger>*:nth-child(1){animation-delay:.05s}.stagger>*:nth-child(2){animation-delay:.1s}.stagger>*:nth-child(3){animation-delay:.12s}
.stagger>*:nth-child(4){animation-delay:.16s}.stagger>*:nth-child(5){animation-delay:.2s}

.btn-primary{background:linear-gradient(135deg,#7c83ff,#a78bfa);color:#fff;border:none;padding:14px 36px;border-radius:16px;font-weight:700;font-size:1.1rem;cursor:pointer;transition:all .2s;box-shadow:0 4px 16px rgba(124,131,255,.3)}

.slider-track{width:100%;height:8px;border-radius:4px;background:#e2e8f0;position:relative}
.slider-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--pastel-lavender),var(--pastel-pink));transition:width .1s}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;background:transparent;position:absolute;top:20px;left:0;margin:0;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#7c83ff,#a78bfa);border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
input[type=range]::-moz-range-thumb{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#7c83ff,#a78bfa);border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.2);cursor:pointer}
.slider-value{font-size:2rem;font-weight:800;color:#7c83ff}
.level-3-option-large{font-size:22px;padding:18px 24px}
.level-3-text-large{font-size:24px;line-height:1.7}
.level-3-hint-large{font-size:20px;line-height:1.6}

.drag-tf-zone{min-height:60px;border:2px dashed var(--pastel-lavender);border-radius:12px;padding:8px;transition:all .2s;display:flex;flex-wrap:wrap;gap:6px;align-items:flex-start;align-content:flex-start}

.drag-tf-item{background:linear-gradient(135deg,var(--pastel-yellow),#fde8a0);padding:8px 14px;border-radius:10px;cursor:grab;font-weight:500;font-size:.9rem;user-select:none;touch-action:none;transition:transform .15s,box-shadow .15s}
.drag-tf-item:active,.drag-tf-item.dragging{cursor:grabbing;transform:scale(1.05);box-shadow:0 6px 16px rgba(0,0,0,.12);z-index:50}
.stat-card{background:#fff;border-radius:16px;padding:20px;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06);flex:1;min-width:120px}
.stat-card .stat-value{font-size:1.8rem;font-weight:800;line-height:1.2}
.stat-card .stat-label{font-size:.85rem;font-weight:600;color:var(--text-mid);margin-bottom:6px}
.feedback-section{background:#fff;border-radius:16px;padding:20px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);text-align:left}
.feedback-section h3{margin:0 0 10px 0;font-size:1.05rem}
.feedback-section ul{margin:0;padding-left:20px;list-style:disc}

.perf-bar-wrong{background:#fca5a5;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;transition:width .4s}
.level-card{background:#fff;border-radius:20px;padding:0;box-shadow:0 2px 12px rgba(0,0,0,.06);overflow:hidden;margin-bottom:16px}
.level-card-header{padding:16px 20px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:1.05rem;transition:background .2s}
.level-card-header:hover{background:#f8fafc}
.level-card-body{padding:0 20px 20px;display:none}
.level-card-body.open{display:block}
</style>

const LEVEL_0_QUESTIONS=[{type:'mcq',topic:'Cơ năng',knowledgeGroup:'khai_niem_co_nang',tag:'L0_C01 – Khái niệm cơ năng',tagExplanation:'Nhận biết cơ năng là tổng động năng và thế năng của vật.',question:'Cơ năng của một vật bằng:',options:[{key:'A',text:'Hiệu của động năng và thế năng của vật.'},{key:'B',text:'Hiệu của thế năng và động năng của vật.'},{key:'C',text:'Tổng động năng và thế năng của vật.'},{key:'D',text:'Tích của động năng và thế năng của vật.'}],answer:'C',explanation:'📘 Giải thích đáp án:\nCơ năng của một vật là tổng động năng và thế năng của vật.\nCông thức:\nW = Wđ + Wt\nCơ năng không phải là hiệu hoặc tích của động năng và thế năng.',hint:'Em hãy xem xét: cơ năng có liên quan đến một hay hai dạng năng lượng? Phép toán nào được dùng để kết hợp hai dạng này?'},{type:'drag_tf',topic:'Rơi tự do & Cơ năng',knowledgeGroup:'bao_toan_co_nang_khi_roi_tu_do',tag:'L0_C02 – Bảo toàn cơ năng khi rơi tự do',tagExplanation:'Nhận ra cơ năng được bảo toàn khi vật rơi tự do và bỏ qua lực cản không khí.',question:'Khi một vật được thả rơi tự do, bỏ qua lực cản không khí, hãy kéo các phát biểu sau vào ô Đúng hoặc Sai.',statements:[{text:'Động năng của vật tăng dần.',answer:true},{text:'Thế năng của vật giảm dần.',answer:true},{text:'Tổng động năng và thế năng của vật không đổi.',answer:true},{text:'Cơ năng của vật luôn thay đổi.',answer:false}],explanation:'📘 Giải thích đáp án:\nKhi vật rơi tự do và bỏ qua lực cản không khí, cơ năng của vật được bảo toàn.\nPhân tích:\nTrong quá trình rơi, vận tốc tăng nên động năng tăng dần.\nĐộ cao giảm nên thế năng giảm dần.\nTổng động năng và thế năng không đổi.\nLưu ý:\nPhát biểu "cơ năng của vật luôn thay đổi" là sai.',hint:'Em hãy xét quá trình vật rơi tự do: độ cao giảm dần còn tốc độ tăng dần.\nKhi bỏ qua lực cản không khí, phần năng lượng mất đi từ độ cao có chuyển sang dạng nào?',scoring:'all_or_nothing',wrongAnalysis:'Em còn nhầm lẫn giữa sự thay đổi của từng thành phần với tổng cơ năng.'},{type:'drag_match',topic:'Rơi tự do & Cơ năng',knowledgeGroup:'bien_doi_nang_luong_khi_vat_roi',tag:'L0_C03 – Biến đổi năng lượng khi vật rơi',tagExplanation:'Xác định được động năng tăng, thế năng giảm và cơ năng không đổi khi vật rơi.',question:'Khi vật rơi từ độ cao h xuống mặt đất, bỏ qua lực cản không khí, hãy ghép mỗi đại lượng với sự biến đổi tương ứng.',pairs:[{left:'Động năng',right:'Tăng'},{left:'Thế năng',right:'Giảm'},{left:'Cơ năng',right:'Không đổi'}],explanation:'📘 Giải thích đáp án:\nKhi vật rơi xuống, tốc độ của vật tăng còn độ cao giảm.\nPhân tích:\nTốc độ tăng nên động năng tăng.\nĐộ cao giảm nên thế năng giảm.\nBỏ qua lực cản không khí nên cơ năng không đổi.',hint:'Em hãy quan sát sự biến đổi khi vật rơi xuống: tốc độ tăng, độ cao giảm. Từ đó ghép từng đại lượng với sự thay đổi phù hợp.',scoring:'all_or_nothing',wrongAnalysis:'Em chưa ghép đúng chiều biến đổi.'},{type:'fill_text',topic:'Chuyển hóa năng lượng',knowledgeGroup:'chuyen_hoa_nang_luong_khi_vat_di_len',tag:'L0_C04 – Chuyển hóa năng lượng khi vật đi lên',tagExplanation:'Nhận ra động năng chuyển hóa thành thế năng khi vật chuyển động đi lên.',question:'Khi một quả bóng được ném thẳng đứng lên cao, trong quá trình bóng đi lên, một phần …… chuyển hóa thành …….',answer:'động năng',answer2:'thế năng',accept1:['động năng','dong nang'],accept2:['thế năng','the nang'],explanation:'📘 Giải thích đáp án:\nKhi quả bóng đi lên, vận tốc của bóng giảm còn độ cao tăng.\nPhân tích:\nVận tốc giảm nên động năng giảm.\nĐộ cao tăng nên thế năng tăng.\nSự chuyển hóa:\nMột phần động năng chuyển hóa thành thế năng.',hint:'Em hãy xét quá trình bóng đi lên: tốc độ của bóng giảm dần còn độ cao tăng dần. Dạng năng lượng nào giảm và dạng năng lượng nào tăng?',wrongAnalysis:'Em chưa xác định đúng chiều chuyển hóa năng lượng.'},{type:'mcq',topic:'Bảo toàn cơ năng',knowledgeGroup:'dieu_kien_bao_toan_co_nang',tag:'L0_C05 – Điều kiện bảo toàn cơ năng',tagExplanation:'Nhận biết cơ năng được bảo toàn khi bỏ qua sức cản hoặc lực cản không khí.',question:'Một vật nhỏ được ném lên từ điểm M phía trên mặt đất; vật lên tới điểm N thì dừng lại rồi rơi xuống. Bỏ qua sức cản của không khí.\nTrong quá trình vật chuyển động từ M đến N, phát biểu nào đúng?',options:[{key:'A',text:'Cơ năng không đổi.'},{key:'B',text:'Thế năng giảm.'},{key:'C',text:'Cơ năng cực đại tại N.'},{key:'D',text:'Động năng tăng.'}],answer:'A',explanation:'📘 Giải thích đáp án:\nVật chuyển động từ M đến N và bỏ qua sức cản của không khí.\nPhân tích:\nTrong quá trình đi lên, động năng giảm và thế năng tăng.\nTổng động năng và thế năng không đổi.\nLưu ý:\nCơ năng không cực đại riêng tại N mà được bảo toàn trong suốt quá trình chuyển động.',hint:'Em hãy chú ý điều kiện "bỏ qua sức cản của không khí". Khi đó, trong quá trình vật đi từ M đến N, động năng và thế năng có thể thay đổi, nhưng tổng của chúng có thay đổi không?',wrongAnalysis:'Em chưa áp dụng đúng định luật bảo toàn cơ năng.'},{type:'mcq',topic:'Bảo toàn cơ năng',knowledgeGroup:'tinh_dong_nang_tu_co_nang',tag:'L0_C06 – Tính động năng từ cơ năng',tagExplanation:'Dùng cơ năng và thế năng đã biết để tính động năng của vật.',question:'Khi một bạn học sinh thả một quả bóng trong trọng trường thì cơ năng của quả bóng được bảo toàn. Chọn mốc thế năng tại mặt đất. Tại một vị trí, quả bóng có động năng và thế năng lần lượt là 5 J và 15 J. Tại một vị trí khác, thế năng của quả bóng là 8 J. Khi đó động năng của quả bóng bằng bao nhiêu?',options:[{key:'A',text:'20 J'},{key:'B',text:'10 J'},{key:'C',text:'6 J'},{key:'D',text:'12 J'}],answer:'D',explanation:'📘 Giải thích đáp án:\nCơ năng ban đầu:\nW = Wđ + Wt\nThay số:\nW = 5 + 15 = 20 J\nKhi thế năng là 8 J:\nW = Wđ + Wt\nSuy ra:\nWđ = W - Wt\nThay số:\nWđ = 20 - 8 = 12 J',hint:'Em hãy tính tổng động năng và thế năng ban đầu để xác định cơ năng của quả bóng. Sau đó dùng quan hệ: cơ năng = động năng + thế năng để tìm phần còn lại.',wrongAnalysis:'Em chưa vận dụng đúng công thức bảo toàn cơ năng.'},{type:'fill_number',topic:'Tính cơ năng',knowledgeGroup:'co_nang_ban_dau_cua_vat_nem_len',tag:'L0_C07 – Cơ năng ban đầu của vật ném lên',tagExplanation:'Xác định cơ năng ban đầu của vật từ động năng khi chọn mốc thế năng tại mặt đất.',question:'Từ mặt đất, một vật có khối lượng 200 g được ném lên với vận tốc 30 m/s. Chọn mốc thế năng tại mặt đất. Bỏ qua sức cản không khí. Cơ năng của vật khi ném là bao nhiêu J?',answer:'90',accept1:['90'],explanation:'📘 Giải thích đáp án:\nĐổi đơn vị khối lượng:\n200 g = 0,2 kg\nVì chọn mốc thế năng tại mặt đất nên thế năng ban đầu bằng 0.\nCơ năng khi ném bằng động năng ban đầu:\nW = Wđ\nWđ = 1/2.m.v²\nWđ = 1/2.0,2.30² = 90 J',hint:'💡 Gợi ý: Em hãy nhớ đổi khối lượng 200 g sang kg trước.\nVì vật được ném từ mặt đất và chọn mốc thế năng tại mặt đất, hãy xét dạng năng lượng ban đầu của vật.',wrongAnalysis:'Em tính sai cơ năng từ công thức ½mv².',unit:'J'},{type:'fill_text',topic:'Tính động năng',knowledgeGroup:'dong_nang_tu_do_giam_the_nang',tag:'L0_C08 – Động năng từ độ giảm thế năng',tagExplanation:'Tính động năng của vật dựa vào phần thế năng đã giảm trong quá trình rơi.',question:'Một vật có khối lượng 500 g rơi tự do từ độ cao 100 m xuống đất. Lấy g = 10 m/s². Động năng của vật tại độ cao 50 m so với mặt đất bằng bao nhiêu J?',answer:'250',answer2:'',accept1:['250'],accept2:[],explanation:'📘 Giải thích đáp án:\nĐổi đơn vị:\n500 g = 0,5 kg\nVật đã rơi được:\ns = 100 - 50 = 50 m\nÝ chính:\nPhần thế năng giảm đi chuyển hóa thành động năng.\nCông thức:\nWđ = m.g.s\nThay số:\nWđ = 0,5.10.50 = 250 J',hint:'Em hãy xác định vật đã rơi được bao nhiêu mét so với vị trí ban đầu. Phần thế năng giảm đi trong quãng đường đó sẽ chuyển hóa thành dạng năng lượng nào?',wrongAnalysis:'Em chưa tính đúng động năng bằng độ giảm thế năng.',unit:'J'},{type:'slider',topic:'Bảo toàn cơ năng',knowledgeGroup:'ti_le_dong_nang_va_the_nang',tag:'L0_C09 – Tỉ lệ động năng và thế năng',tagExplanation:'Lập quan hệ giữa động năng và thế năng theo tỉ lệ cho trước.',question:'Một vật được thả rơi tự do không vận tốc đầu từ độ cao 60 m so với mặt đất. Chọn mốc thế năng tại mặt đất. Hãy kéo thanh trượt để chọn độ cao mà tại đó động năng của vật bằng 3 lần thế năng của vật.',min:0,max:60,step:5,answer:15,unit:'m',explanation:'📘 Giải thích đáp án:\nGọi độ cao cần chọn là:\nh\nCơ năng ban đầu:\nW = mg.60\nTại độ cao h:\nThế năng là mg.h\nĐộng năng là mg.(60 - h)\nĐiều kiện:\nWđ = 3Wt\nThay vào:\nmg.(60 - h) = 3mg.h\nRút gọn:\n60 - h = 3h\nSuy ra:\nh = 15 m',hint:'Em hãy gọi độ cao cần chọn là h. Khi động năng bằng 3 lần thế năng, phần năng lượng ứng với độ cao còn lại so với phần năng lượng đã chuyển thành động năng có quan hệ như thế nào?',wrongAnalysis:'Em chưa thiết lập đúng phương trình.'},{type:'mcq',topic:'Bảo toàn cơ năng',knowledgeGroup:'bao_toan_co_nang_qua_nhieu_trang_thai',tag:'L0_C10 – Bảo toàn cơ năng qua nhiều trạng thái',tagExplanation:'So sánh cơ năng của vật ở các trạng thái khác nhau để tìm vận tốc ban đầu.',question:'Một quả bóng khối lượng 200 g được ném thẳng đứng xuống dưới từ độ cao 20 m so với mặt đất. Khi chạm đất, bóng nảy lên đến độ cao 40 m. Bỏ qua lực cản không khí và coi va chạm không làm mất mát cơ năng. Lấy g = 10 m/s².\nVận tốc ném ban đầu của bóng là bao nhiêu?',options:[{key:'A',text:'15 m/s'},{key:'B',text:'25 m/s'},{key:'C',text:'20 m/s'},{key:'D',text:'10 m/s'}],answer:'C',explanation:'📘 Giải thích đáp án:\nCơ năng khi bóng nảy lên đến độ cao 40 m:\nW = mg.40\nCơ năng ban đầu:\nBóng ở độ cao 20 m và có vận tốc ban đầu v0.\nBiểu thức:\nW = mg.20 + 1/2.m.v0²\nBảo toàn cơ năng:\nmg.20 + 1/2.m.v0² = mg.40\nRút gọn:\n1/2.v0² = g.(40 - 20)\nThay số:\n1/2.v0² = 10.20 = 200\nSuy ra:\nv0² = 400\nv0 = 20 m/s',hint:'Em hãy so sánh cơ năng ban đầu ở độ cao 20 m với cơ năng khi bóng nảy lên đến độ cao 40 m. Phần chênh lệch năng lượng liên quan đến yếu tố nào ban đầu?',wrongAnalysis:'Em chưa thiết lập đúng phương trình bảo toàn cơ năng.'}];

const LEVEL_1_QUESTIONS=[{type:'drag_match',topic:'Khái niệm và công thức',knowledgeGroup:'cong_thuc_co_nang',question:'Hãy ghép mỗi đại lượng vật lí với công thức tương ứng.',pairs:[{left:'Động năng',right:'Wđ = 1/2.m.v²'},{left:'Thế năng trọng trường',right:'Wt = m.g.h'},{left:'Cơ năng',right:'W = Wđ + Wt'}],explanation:'Động năng là năng lượng mà vật có được do chuyển động.\nThế năng trọng trường là năng lượng liên quan đến vị trí của vật trong trọng trường.\nCơ năng là tổng động năng và thế năng của vật.\nGhi nhớ:\nW = Wđ + Wt',hint:'💡 Gợi ý: Em hãy dựa vào ý nghĩa của từng đại lượng. Đại lượng liên quan đến chuyển động sẽ gắn với vận tốc; đại lượng liên quan đến độ cao sẽ gắn với h; còn cơ năng liên quan đến cả hai dạng năng lượng.',scoring:'all_or_nothing',wrongAnalysis:'Em chưa ghép đúng công thức.',_answerBlock:'Động năng → Wđ = 1/2.m.v²\nThế năng trọng trường → Wt = m.g.h\nCơ năng → W = Wđ + Wt'},{type:'mcq',topic:'Khái niệm cơ năng',knowledgeGroup:'co_nang_vo_huong',question:'Hãy chọn thẻ mô tả đúng về cơ năng.',options:[{key:'A',text:'Cơ năng là đại lượng vô hướng.'},{key:'B',text:'Cơ năng là vectơ cùng hướng với vận tốc.'},{key:'C',text:'Cơ năng là vectơ cùng hướng với trọng lực.'},{key:'D',text:'Cơ năng chỉ phụ thuộc vào thời gian.'}],answer:'A',explanation:'Cơ năng là một dạng năng lượng.\nNăng lượng là đại lượng vô hướng, không có hướng như vectơ.\nDo đó, cơ năng không phải là vectơ cùng hướng với vận tốc hay trọng lực.',hint:'💡 Gợi ý: Em hãy nhớ cơ năng là một dạng năng lượng. Khi xét một dạng năng lượng, em cần xác định nó có hướng như vectơ hay chỉ có giá trị độ lớn.',wrongAnalysis:'Em nhầm cơ năng với các đại lượng vectơ.',_answerBlock:'A.\nCơ năng là đại lượng vô hướng.'},{type:'drag_tf',topic:'Bảo toàn cơ năng',knowledgeGroup:'bt_roi_tu_do',question:'Khi một vật rơi tự do và bỏ qua lực cản không khí, hãy kéo các phát biểu sau vào ô Đúng hoặc Sai.',statements:[{text:'Cơ năng của vật được bảo toàn.',answer:true},{text:'Tổng động năng và thế năng của vật không đổi.',answer:true},{text:'Cơ năng của vật luôn giảm trong quá trình rơi.',answer:false},{text:'Cơ năng của vật chỉ gồm động năng.',answer:false}],explanation:'Khi vật rơi tự do và bỏ qua lực cản không khí, cơ năng của vật được bảo toàn.\nTrong quá trình rơi, thế năng giảm dần.\nĐộng năng tăng dần.\nTổng động năng và thế năng không đổi.\nCơ năng không chỉ gồm động năng mà gồm cả động năng và thế năng.',hint:'💡 Gợi ý: Em hãy chú ý điều kiện "rơi tự do" và "bỏ qua lực cản không khí". Trong quá trình rơi, độ cao và tốc độ thay đổi, nhưng tổng năng lượng cơ học có thay đổi không?',scoring:'all_or_nothing',wrongAnalysis:'Em chưa hiểu đúng bảo toàn cơ năng.',_answerBlock:'Phát biểu 1: Đúng.\nPhát biểu 2: Đúng.\nPhát biểu 3: Sai.\nPhát biểu 4: Sai.'},{type:'mcq',topic:'Con lắc đơn',knowledgeGroup:'con_lac_vi_tri_thap_nhat',question:'Xét một con lắc đơn dao động, bỏ qua lực cản không khí. Khi vật đi từ vị trí biên về vị trí thấp nhất thì:',options:[{key:'A',text:'Động năng giảm, thế năng tăng.'},{key:'B',text:'Động năng tăng, thế năng giảm.'},{key:'C',text:'Động năng và thế năng đều tăng.'},{key:'D',text:'Động năng và thế năng đều giảm.'}],answer:'B',explanation:'Khi con lắc đơn đi từ vị trí biên về vị trí thấp nhất:\n\nVật chuyển động nhanh dần, tức là tốc độ tăng → động năng tăng.\nĐồng thời vật đi xuống thấp hơn nên độ cao giảm → thế năng giảm.\nVì vậy, trong quá trình này:\nĐộng năng tăng\nThế năng giảm.',hint:'💡 Gợi ý: Em hãy quan sát vị trí của vật trên quỹ đạo con lắc. Vị trí nào có độ cao nhỏ nhất thì thế năng nhỏ nhất; vị trí nào vật chuyển động nhanh nhất thì động năng lớn nhất.',wrongAnalysis:'Em chưa phân tích đúng sự thay đổi tốc độ và độ cao trong quá trình con lắc đi từ biên về thấp nhất.'},{type:'drag_match',topic:'Chuyển hóa năng lượng',knowledgeGroup:'bien_doi_khi_roi',question:'Một quả bóng được ném ngang khỏi mặt bàn và rơi xuống sàn. Bỏ qua lực cản không khí.\nHãy ghép mỗi đại lượng với sự biến đổi phù hợp trong quá trình bóng rơi xuống.',pairs:[{left:'Động năng',right:'Tăng'},{left:'Thế năng',right:'Giảm'},{left:'Cơ năng',right:'Không đổi'}],explanation:'Đáp án đúng là:\nĐộng năng → Tăng\nThế năng → Giảm\nCơ năng → Không đổi\n\n📘 Giải thích đáp án:\nÝ chính:\nKhi quả bóng rơi xuống, độ cao của bóng giảm còn tốc độ của bóng tăng.\nPhân tích:\nĐộ cao giảm nên thế năng giảm.\nTốc độ của bóng tăng nên động năng tăng.\nBỏ qua lực cản không khí nên cơ năng được bảo toàn.',hint:'💡 Gợi ý: Em hãy xét quá trình quả bóng rơi xuống: độ cao giảm dần, tốc độ tăng dần. Từ đó suy ra dạng năng lượng nào tăng, dạng nào giảm và tổng cơ năng có đổi không.',scoring:'all_or_nothing',wrongAnalysis:'Em chưa ghép đúng sự biến đổi.'},{type:'drag_tf',topic:'Bảo toàn cơ năng',knowledgeGroup:'vat_nem_len',question:'Một vật được ném thẳng đứng lên cao. Bỏ qua lực cản không khí. Hãy kéo các phát biểu sau vào ô Đúng hoặc Sai.',statements:[{text:'Tại vị trí cao nhất, vận tốc của vật bằng 0.',answer:true},{text:'Tại vị trí cao nhất, động năng của vật đạt giá trị cực đại.',answer:false},{text:'Trong quá trình chuyển động, cơ năng của vật không đổi.',answer:true},{text:'Khi vật đi lên, thế năng của vật giảm dần.',answer:false}],explanation:'Đáp án đúng là:\nPhát biểu 1: Đúng.\nPhát biểu 2: Sai.\nPhát biểu 3: Đúng.\nPhát biểu 4: Sai.\n\n📘 Giải thích đáp án:\nÝ chính:\nKhi vật được ném thẳng đứng lên cao, vận tốc của vật giảm dần trong quá trình đi lên.\nPhân tích:\nTại vị trí cao nhất, vận tốc của vật bằng 0.\nVì vận tốc bằng 0 nên động năng không đạt cực đại tại vị trí cao nhất.\nKhi vật đi lên, độ cao tăng nên thế năng tăng dần.\nBỏ qua lực cản không khí nên cơ năng của vật không đổi.',hint:'💡 Gợi ý: Em hãy xét từng giai đoạn của vật khi được ném lên cao.\nỞ vị trí cao nhất, vận tốc có đặc điểm gì? Khi bỏ qua lực cản, tổng động năng và thế năng có được bảo toàn không?',scoring:'all_or_nothing',wrongAnalysis:'Em chưa phân tích đúng.'},{type:'drag_match',topic:'Chuyển hóa năng lượng',knowledgeGroup:'chuyen_hoa_con_lac',question:'Hãy ghép quá trình chuyển động của con lắc với sự chuyển hóa năng lượng phù hợp.',pairs:[{left:'Từ vị trí cao xuống vị trí thấp nhất',right:'Thế năng giảm, động năng tăng'},{left:'Từ vị trí thấp nhất đi lên vị trí cao',right:'Động năng giảm, thế năng tăng'},{left:'Nếu bỏ qua lực cản',right:'Cơ năng không đổi'}],explanation:'Đáp án đúng là:\nTừ vị trí cao xuống vị trí thấp nhất → Thế năng giảm, động năng tăng\nTừ vị trí thấp nhất đi lên vị trí cao → Động năng giảm, thế năng tăng\nNếu bỏ qua lực cản → Cơ năng không đổi\n\n📘 Giải thích đáp án:\nÝ chính:\nTrong dao động của con lắc, động năng và thế năng chuyển hóa qua lại.\nPhân tích:\nKhi vật đi từ vị trí cao xuống vị trí thấp nhất, độ cao giảm nên thế năng giảm, vận tốc tăng nên động năng tăng.\nKhi vật đi từ vị trí thấp nhất lên vị trí cao, vận tốc giảm nên động năng giảm, độ cao tăng nên thế năng tăng.\nNếu bỏ qua lực cản, cơ năng của con lắc không đổi.',hint:'💡 Gợi ý: Em hãy so sánh hai chiều chuyển động của con lắc: khi vật đi xuống thấp hơn và khi vật đi lên cao hơn. Hai quá trình này có sự chuyển hóa năng lượng ngược nhau.',scoring:'all_or_nothing',wrongAnalysis:'Em chưa ghép đúng sự chuyển hóa.'},{type:'fill_number',topic:'Tính thế năng',knowledgeGroup:'tinh_the_nang',question:'Một vật có khối lượng m = 1 kg ở độ cao h = 5 m so với mặt đất. Chọn mốc thế năng tại mặt đất. Lấy g = 10 m/s². Thế năng trọng trường của vật bằng bao nhiêu J?',answer:50,accept:[50],explanation:'Đáp án đúng là:\n50 J.\n\n📘 Giải thích đáp án:\nCông thức:\nWt = m.g.h\nThay số:\nWt = 1.10.5 = 50 J',hint:'💡 Gợi ý: Em hãy xác định đúng ba đại lượng cần dùng để tính thế năng trọng trường: khối lượng, gia tốc trọng trường và độ cao so với mốc thế năng.',wrongAnalysis:'Em tính sai thế năng.'},{type:'fill_number',topic:'Tính động năng',knowledgeGroup:'dong_nang_khi_roi',question:'Một vật có khối lượng 1 kg rơi tự do từ độ cao 50 cm xuống đất. Lấy g = 10 m/s², bỏ qua lực cản không khí. Động năng của vật ngay trước khi chạm đất bằng bao nhiêu J?',answer:5,accept:[5],explanation:'Đáp án đúng là:\n5 J.\n\n📘 Giải thích đáp án:\nĐổi đơn vị:\n50 cm = 0,5 m\nÝ chính:\nVật rơi tự do từ trạng thái nghỉ và bỏ qua lực cản không khí.\nThế năng ban đầu chuyển hóa thành động năng ngay trước khi vật chạm đất.\nCông thức:\nWđ = m.g.h\nThay số:\nWđ = 1.10.0,5 = 5 J',hint:'💡 Gợi ý: Em hãy nhớ đổi đơn vị 50 cm.\nSau đó xét xem thế năng ban đầu đã chuyển hóa thành dạng năng lượng nào ngay trước khi vật chạm đất.',wrongAnalysis:'Em tính sai động năng.'},{type:'mcq',topic:'Bảo toàn cơ năng',knowledgeGroup:'ti_le_dong_the_nang',question:'Một vật được ném thẳng đứng lên từ mặt đất với vận tốc ban đầu v0 = 10 m/s. Bỏ qua lực cản không khí. Khi động năng bằng thế năng, tốc độ của vật gần đúng bằng bao nhiêu?',options:[{key:'A',text:'5,0 m/s.'},{key:'B',text:'7,1 m/s.'},{key:'C',text:'10 m/s.'},{key:'D',text:'14,1 m/s.'}],answer:'B',explanation:'Đáp án đúng là:\nB. 7,1 m/s.\n\n📘 Giải thích đáp án:\nCơ năng ban đầu:\nW = 1/2.m.v0²\nKhi động năng bằng thế năng:\nWđ = Wt\nSuy ra:\nĐộng năng bằng một nửa cơ năng ban đầu.\nTa có:\n1/2.m.v² = 1/2.(1/2.m.v0²)\nRút gọn:\nv² = v0²/2\nSuy ra:\nv = v0/√2\nThay số:\nv = 10/√2 ≈ 7,1 m/s',hint:'Em hãy xét cơ năng ban đầu của vật khi vừa được ném lên từ mặt đất. Khi động năng bằng thế năng, động năng chiếm bao nhiêu phần của tổng cơ năng ban đầu? Từ đó so sánh tốc độ lúc đó với vận tốc ban đầu.',wrongAnalysis:'Em chưa thiết lập đúng phương trình.'}];
const LEVEL_2_QUESTIONS=[{type:'drag_match',topic:'Khái niệm cơ năng',knowledgeGroup:'khai_niem_co_nang',question:'Hãy ghép mỗi đại lượng vật lí với mô tả tương ứng.',pairs:[{left:'Động năng',right:'Năng lượng liên quan đến chuyển động của vật'},{left:'Thế năng trọng trường',right:'Năng lượng liên quan đến vị trí của vật trong trọng trường'},{left:'Cơ năng',right:'Tổng động năng và thế năng của vật'}],explanation:'📘 Giải thích đáp án:\nĐộng năng là năng lượng mà vật có được do chuyển động.\nThế năng trọng trường là năng lượng liên quan đến vị trí của vật trong trọng trường.\nCơ năng là tổng động năng và thế năng của vật.\nW = Wđ + Wt',hint:'💡 Gợi ý: Em hãy nhớ động năng gắn với chuyển động, thế năng trọng trường gắn với độ cao, còn cơ năng liên quan đến cả hai dạng năng lượng.',scoring:'all_or_nothing',wrongAnalysis:'Em chưa ghép đúng mô tả.'},{type:'drag_tf',topic:'Bảo toàn cơ năng',knowledgeGroup:'bao_toan_co_nang',question:'Khi một vật chuyển động trong trọng trường và bỏ qua lực cản không khí, hãy kéo các phát biểu sau vào ô Đúng hoặc Sai.',statements:[{text:'Cơ năng của vật được bảo toàn.',answer:true},{text:'Cơ năng của vật bằng tổng động năng và thế năng.',answer:true},{text:'Tổng động năng và thế năng của vật không đổi.',answer:true},{text:'Cơ năng của vật luôn giảm trong quá trình chuyển động.',answer:false}],explanation:'Đáp án đúng là:\nPhát biểu 1: Đúng.\nPhát biểu 2: Đúng.\nPhát biểu 3: Đúng.\nPhát biểu 4: Sai.\n\n📘 Giải thích đáp án:\n\nÝ chính:\nKhi vật chuyển động trong trọng trường và bỏ qua lực cản không khí, cơ năng của vật được bảo toàn.\n\nPhân tích:\nĐộng năng và thế năng có thể thay đổi trong quá trình chuyển động.\n\nTuy nhiên, tổng động năng và thế năng không đổi.\n\nLưu ý:\nPhát biểu "cơ năng luôn giảm trong quá trình chuyển động" là sai.',hint:'💡 Gợi ý: Em hãy chú ý điều kiện "bỏ qua lực cản không khí". Khi đó, động năng và thế năng có thể thay đổi, nhưng tổng động năng và thế năng có thay đổi không?',scoring:'all_or_nothing',wrongAnalysis:'Em chưa hiểu đúng bảo toàn cơ năng.'},{type:'mcq',topic:'Bảo toàn cơ năng',knowledgeGroup:'bao_toan_co_nang',question:'Một vật được thả rơi tự do từ độ cao h so với mặt đất. Chọn mốc thế năng tại mặt đất. Ngay lúc vừa thả, vận tốc của vật bằng 0. Phát biểu nào sau đây đúng?',options:[{key:'A',text:'Cơ năng của vật bằng thế năng tại vị trí thả.'},{key:'B',text:'Cơ năng của vật bằng 0.'},{key:'C',text:'Cơ năng của vật chỉ bằng động năng.'},{key:'D',text:'Cơ năng của vật nhỏ hơn thế năng tại vị trí thả.'}],answer:'A',explanation:'Đáp án đúng là:\nA.\nCơ năng của vật bằng thế năng tại vị trí thả.\n\n📘 Giải thích đáp án:\n\nNguyên lí:\nCơ năng của vật bằng tổng động năng và thế năng.\n\nCông thức:\nW = Wđ + Wt\n\nNgay lúc vừa thả:\nVận tốc của vật bằng 0 nên động năng bằng 0.\n\nSuy ra:\nW = 0 + Wt = Wt',hint:'💡 Gợi ý: Em hãy chú ý rằng ngay lúc vừa thả, vật có vận tốc bằng 0. Từ đó, hãy xác định động năng lúc đó bằng bao nhiêu rồi suy ra cơ năng gồm phần nào.',wrongAnalysis:'Em chưa tính toán đúng cơ năng tại vị trí thả.'},{type:'drag_match',topic:'Chuyển hóa năng lượng',knowledgeGroup:'chuyen_hoa_nang_luong',question:'Một quả bóng được ném ngang khỏi mặt bàn và rơi xuống sàn. Bỏ qua lực cản không khí. Hãy ghép đại lượng với sự biến đổi phù hợp khi bóng đang rơi.',pairs:[{left:'Động năng',right:'Tăng'},{left:'Thế năng',right:'Giảm'},{left:'Cơ năng',right:'Không đổi'}],explanation:'Đáp án đúng là:\nĐộng năng → Tăng.\nThế năng → Giảm.\nCơ năng → Không đổi.\n\n📘 Giải thích đáp án:\n\nÝ chính:\nKhi quả bóng rơi xuống, độ cao của bóng giảm còn tốc độ của bóng tăng.\n\nPhân tích:\nĐộ cao giảm nên thế năng giảm.\n\nTốc độ của bóng tăng nên động năng tăng.\n\nBỏ qua lực cản không khí nên cơ năng được bảo toàn.',hint:'💡 Gợi ý: Em hãy quan sát quá trình quả bóng đang rơi: độ cao giảm còn tốc độ tăng. Sau đó, hãy ghép từng đại lượng với sự biến đổi phù hợp và nhớ rằng bỏ qua lực cản thì cơ năng được bảo toàn.',scoring:'all_or_nothing',wrongAnalysis:'Em chưa ghép đúng sự biến đổi.'},{type:'mcq',topic:'Chuyển hóa năng lượng',knowledgeGroup:'chuyen_hoa_nang_luong',question:'Một con lắc đơn dao động, bỏ qua lực cản không khí. Khi vật đi từ vị trí thấp nhất lên vị trí cao hơn, phát biểu nào sau đây đúng?',options:[{key:'A',text:'Động năng giảm, thế năng tăng.'},{key:'B',text:'Động năng tăng, thế năng giảm.'},{key:'C',text:'Cả động năng và thế năng đều tăng.'},{key:'D',text:'Cơ năng giảm dần về 0.'}],answer:'A',explanation:'Đáp án đúng là:\nA. Động năng giảm, thế năng tăng.\n\n📘 Giải thích đáp án:\n\nÝ chính:\nKhi con lắc đi từ vị trí thấp nhất lên vị trí cao hơn, vật chuyển động chậm dần và độ cao tăng.\n\nPhân tích:\nVận tốc giảm nên động năng giảm.\n\nĐộ cao tăng nên thế năng tăng.\n\nNếu bỏ qua lực cản không khí, cơ năng của con lắc không đổi.',hint:'💡 Gợi ý: Em hãy xét quá trình con lắc đi từ vị trí thấp nhất lên vị trí cao hơn. Khi đó, vận tốc của vật giảm còn độ cao tăng, nên động năng và thế năng thay đổi như thế nào?',wrongAnalysis:'Em chưa phân tích đúng.'},{type:'fill_number',topic:'Tính cơ năng',knowledgeGroup:'van_dung_cong_thuc',question:'Một quả bóng nhỏ có khối lượng 100 g được ném theo phương ngang với vận tốc ban đầu 4 m/s từ độ cao 1 m so với sàn. Chọn mốc thế năng tại sàn. Lấy g = 10 m/s², bỏ qua lực cản không khí.\nCơ năng của quả bóng lúc bắt đầu rời khỏi bàn là bao nhiêu J?',answer:1.8,accept:[1.8,'1,8','1.8'],explanation:'Đáp án đúng là:\n1,8 J.\n\n📘 Giải thích đáp án:\n\nĐổi đơn vị:\n100 g = 0,1 kg\n\nĐộng năng ban đầu:\nWđ = 1/2.m.v²\n\nThay số:\nWđ = 1/2.0,1.4² = 0,8 J\n\nThế năng ban đầu:\nWt = m.g.h\n\nThay số:\nWt = 0,1.10.1 = 1 J\n\nCơ năng:\nW = Wđ + Wt\n\nThay số:\nW = 0,8 + 1 = 1,8 J',hint:'💡 Gợi ý: Em hãy nhớ cơ năng lúc bóng rời khỏi bàn bằng tổng động năng và thế năng. Trước khi tính, hãy đổi khối lượng từ gam sang kilôgam.',wrongAnalysis:'Em tính sai cơ năng.',unit:'J'},{type:'mcq',topic:'Bảo toàn cơ năng',knowledgeGroup:'van_dung_cong_thuc',question:'Một vật có khối lượng 500 g được thả rơi từ độ cao 30 m so với mặt đất. Lấy g = 10 m/s². Chọn mốc thế năng tại mặt đất. Khi động năng của vật bằng 75 J thì thế năng của vật bằng bao nhiêu?',options:[{key:'A',text:'25 J.'},{key:'B',text:'50 J.'},{key:'C',text:'75 J.'},{key:'D',text:'150 J.'}],answer:'C',explanation:'Đáp án đúng là:\nC. 75 J.\n\n📘 Giải thích đáp án:\n\nĐổi đơn vị:\n500 g = 0,5 kg\n\nVì vật được thả rơi từ trạng thái nghỉ nên cơ năng ban đầu bằng thế năng tại độ cao 30 m.\n\nCơ năng ban đầu:\nW = m.g.h\n\nThay số:\nW = 0,5.10.30 = 150 J\n\nKhi động năng bằng 75 J:\nW = Wđ + Wt\n\nSuy ra:\nWt = W - Wđ\n\nThay số:\nWt = 150 - 75 = 75 J',hint:'💡 Gợi ý: Em hãy tính cơ năng ban đầu của vật tại độ cao 30 m. Sau đó dùng quan hệ: cơ năng = động năng + thế năng để tìm phần còn lại.',wrongAnalysis:'Em chưa áp dụng đúng bảo toàn cơ năng.'},{type:'fill_number',topic:'Tính toán năng lượng',knowledgeGroup:'van_dung_cong_thuc',question:'Một vật có khối lượng 500 g rơi tự do không vận tốc đầu từ độ cao 100 m xuống đất. Lấy g = 10 m/s², bỏ qua lực cản không khí. Động năng của vật sau khi rơi được quãng đường 60 m là bao nhiêu J?',answer:300,accept:[300],explanation:'Đáp án đúng là:\n300 J.\n\n📘 Giải thích đáp án:\n\nĐổi đơn vị:\n500 g = 0,5 kg\n\nÝ chính:\nKhi vật rơi tự do, phần thế năng bị giảm sẽ chuyển thành động năng.\n\nVật đã rơi được:\ns = 60 m\n\nĐộng năng sau khi rơi được 60 m:\nWđ = m.g.s\n\nThay số:\nWđ = 0,5.10.60 = 300 J',hint:'💡 Gợi ý: Em hãy chú ý rằng khi vật rơi tự do, phần thế năng bị giảm sẽ chuyển thành động năng. Ở câu này, cần dùng quãng đường vật đã rơi được, không phải toàn bộ độ cao ban đầu.',wrongAnalysis:'Em tính sai động năng.'},{type:'slider',topic:'Bảo toàn cơ năng',knowledgeGroup:'van_dung_cong_thuc',question:'Một viên bi được thả không vận tốc đầu từ đỉnh một mặt phẳng nghiêng cao 40 cm. Bỏ qua ma sát và lực cản không khí.\nHãy kéo thanh trượt để chọn độ cao của viên bi so với chân dốc khi thế năng của viên bi bằng 3 lần động năng.',min:0,max:40,step:5,answer:30,unit:'cm',explanation:'Đáp án đúng là:\n30 cm.\n\n📘 Giải thích đáp án:\n\nÝ chính:\nCơ năng ban đầu tương ứng với độ cao 40 cm.\n\nĐiều kiện:\nThế năng bằng 3 lần động năng.\n\nSuy ra:\nThế năng chiếm 3 phần.\n\nĐộng năng chiếm 1 phần.\n\nTổng cơ năng gồm 4 phần.\n\nTỉ lệ:\nThế năng chiếm 3/4 cơ năng.\n\nĐộ cao cần chọn:\nh = 3/4.40 = 30 cm',hint:'💡 Gợi ý: Em hãy xem cơ năng ban đầu tương ứng với độ cao 40 cm. Khi thế năng bằng 3 lần động năng, hãy suy nghĩ xem thế năng chiếm mấy phần trong tổng cơ năng.',wrongAnalysis:'Em chưa thiết lập đúng phương trình.'},{type:'fill_number',topic:'Con lắc đơn',knowledgeGroup:'van_dung_cong_thuc',question:'Một con lắc đơn có dây treo dài 1 m, vật nặng có khối lượng 0,5 kg. Kéo vật đến vị trí dây treo lệch phương thẳng đứng một góc 60° rồi thả nhẹ. Lấy g = 10 m/s², bỏ qua lực cản. Chọn mốc thế năng tại vị trí thấp nhất. Động năng của vật khi đi qua vị trí thấp nhất bằng bao nhiêu J?',answer:2.5,accept:[2.5,2.50],explanation:'📘 Giải thích đáp án:\nĐộ cao ban đầu của vật so với vị trí thấp nhất là:\nh = l.(1 - cos60°)\nh = 1.(1 - 0,5) = 0,5 m\nThế năng ban đầu của vật là:\nWt = m.g.h\nWt = 0,5.10.0,5 = 2,5 J\nVật được thả nhẹ nên động năng ban đầu bằng 0.\nBỏ qua lực cản nên cơ năng được bảo toàn.\nKhi vật đi qua vị trí thấp nhất, thế năng ban đầu đã chuyển hóa thành động năng.\nVì vậy, động năng của vật tại vị trí thấp nhất là 2,5 J.',hint:'💡 Gợi ý: Em hãy tìm độ cao ban đầu của vật so với vị trí thấp nhất. Khi vật đi qua vị trí thấp nhất, thế năng ban đầu đã chuyển hóa thành động năng.',wrongAnalysis:'Em chưa áp dụng đúng bảo toàn cơ năng cho con lắc.',unit:'J'}];
const LEVEL_3_QUESTIONS=[{type:'mcq',topic:'Khái niệm cơ năng',knowledgeGroup:'khai_niem_co_nang',question:'Phát biểu nào sau đây đúng về cơ năng của một vật?',options:[{key:'A',text:'Cơ năng là đại lượng vô hướng và có thể âm, dương hoặc bằng không tùy theo mốc thế năng.'},{key:'B',text:'Cơ năng là đại lượng vectơ và luôn dương.'},{key:'C',text:'Cơ năng chỉ phụ thuộc vào động năng của vật.'},{key:'D',text:'Cơ năng luôn bằng thế năng của vật.'}],answer:'A',explanation:'📘 Giải thích: Cơ năng là tổng động năng và thế năng của vật: W = Wđ + Wt. Động năng và thế năng đều là đại lượng vô hướng nên cơ năng cũng là đại lượng vô hướng. Vì thế năng phụ thuộc vào mốc thế năng được chọn, nên giá trị cơ năng có thể âm, dương hoặc bằng không. Vì vậy đáp án đúng là A.',hint:'💡 Gợi ý: Hãy nhớ cơ năng được tạo từ những dạng năng lượng nào. Cơ năng là đại lượng vô hướng hay vectơ? Giá trị thế năng có phụ thuộc vào mốc chọn hay không?',wrongAnalysis:'Em chưa hiểu rõ bản chất cơ năng.'},{type:'mcq',topic:'Mốc thế năng',knowledgeGroup:'khai_niem_co_nang',question:'Vì sao giá trị cơ năng của một vật có thể thay đổi khi chọn mốc thế năng khác nhau?',options:[{key:'A',text:'Vì thế năng phụ thuộc vào mốc thế năng được chọn.'},{key:'B',text:'Vì động năng luôn thay đổi khi đổi mốc thế năng.'},{key:'C',text:'Vì khối lượng của vật thay đổi theo mốc thế năng.'},{key:'D',text:'Vì vận tốc của vật luôn bằng 0 khi đổi mốc thế năng.'}],answer:'A',explanation:'📘 Giải thích: Động năng không đổi khi đổi mốc, thế năng thay đổi do phụ thuộc vào mốc được chọn.',hint:'Em hãy so sánh động năng và thế năng: động năng phụ thuộc vào đại lượng nào, thế năng phụ thuộc vào yếu tố nào khi chọn mốc khác?',wrongAnalysis:'Em nhầm giữa ảnh hưởng của mốc thế năng.'},{type:'mcq',topic:'Bảo toàn cơ năng phức tạp',knowledgeGroup:'bao_toan_co_nang',question:'Một quả bóng được ném thẳng đứng xuống dưới từ độ cao 20 m so với mặt đất. Sau khi chạm đất, bóng nảy lên đến độ cao 40 m. Bỏ qua lực cản không khí và coi va chạm khôn // ===== DRAG & DROP (Match) =====
var draggedEl=null;
function setupDrag(){

    el.addEventListener('dragstart',e=>{draggedEl=el;el.classList.add('dragging');e.dataTransfer.setData('text/plain',el.dataset.dragValue)});

function handleDrop(e,zone){e.preventDefault();zone.classList.remove('over');var val=e.dataTransfer.getData('text/plain');dropIntoZone(zone,val,document.querySelector('.drag-item[data-drag-value="'+val+'"]'))}
function dropIntoZone(zone,val,srcEl){
  var key=zone.dataset.dropKey;
  Object.entries(dragState.matchAnswers).forEach(entry=>{if(entry[1]===val){delete dragState.matchAnswers[entry[0]];var z=document.querySelector('.drop-zone[data-drop-key="'+entry[0]+'"]');if(z){z.innerHTML='';z.classList.remove('filled')}}});
  dragState.matchAnswers[key]=val;zone.innerHTML='<span class="font-semibold text-sm">'+val+'</span>';zone.classList.add('filled');
  if(srcEl)srcEl.style.opacity='.4';

        answerBlock='';
} else if(q.type==='drag_match'){

    attempts++;

    return;
  }
  // Second attempt (or correct answer): show full feedback and lock question
  showFeedback(correct,q);
}

function generateStrengths(questionResults){
  var correctCount=correctFirst+correctSecond;
  
  // Level 1 specific: display knowledge groups from correct answers only
  if(currentLevelId===1){
    // Get knowledge groups from correct answers only

      if(found){
        var displayName=KNOWLEDGE_GROUPS[q.knowledgeGroup]||q.knowledgeGroup;
        // Only add if not already in the list
        if(!correctGroups.find(g=>g.name===displayName)){
          correctGroups.push({name:displayName,idx:idx});

    if(correctGroups.length===0){
      return['Em đã hoàn thành bài luyện tập. Kết quả này giúp em xác định những nội dung cần tiếp tục củng cố.'];

function generateWeaknesses(wrongResults){
  var correctCount=correctFirst+correctSecond;
  var incorrectCount=incorrect;
  
  // Special handling for Level 0 and Level 1
  if(currentLevelId===0 || currentLevelId===1){
    if(incorrectCount===0||incorrectCount===1){
      if(currentLevelId===0){
        return['Em gần như không có nội dung cần cải thiện nổi bật ở Level 0. Em có thể chuyển sang Level tiếp theo để tiếp tục thử thách với các tình huống vận dụng cao hơn.'];
      } else {
        return['Em gần như không có nội dung cần cải thiện nổi bật ở Level 1. Em có thể chuyển sang Level tiếp theo để tiếp tục thử thách với các tình huống vận dụng cao hơn.'];
      }

    if(!wrongResults.length){
      // No wrong answers but incorrectCount >= 2 (shouldn't happen, but fallback)

      'van_dung_cong_thuc':'áp dụng công thức tính cơ năng, động năng, thế năng trong bài toán cụ thể'

} else {

          if(idx===0){

        }

      return messages.length>0?messages:['Em cần luyện lại các nội dung từng bỏ lỡ ở Level 0.'];

        if(item.explanation){
          if(idx===0){

    } else if(incorrectCount>=8){

          }
        }

      return messages.length>0?messages:['Em cần luyện lại các nội dung từng bỏ lỡ ở Level 0.'];

return ['Hiện chưa phát hiện nội dung cần cải thiện rõ ràng. Em có thể tiếp tục luyện thêm các bài toán tương tự.'];

function showPerfAuth(){

  document.getElementById('perf-auth').classList.toggle('hidden');
  document.getElementById('perf-pw').focus();
}
function checkPerfPassword(){
  var pw=document.getElementById('perf-pw').value;
  if(pw==='12345'){
    perfUnlocked=true;
    document.getElementById('perf-auth').classList.add('hidden');
    document.getElementById('perf-dashboard').classList.remove('hidden');
    renderPerfDashboard();
  } else {
    document.getElementById('perf-pw-error').classList.remove('hidden');
    document.getElementById('perf-pw').value='';
    setTimeout(()=>document.getElementById('perf-pw-error').classList.add('hidden'),3000);
  }
}

function renderPerfDashboard() {
  var container = document.getElementById('perf-levels-container');
  var html = '';
  
  for (var lvl = 0; lvl < 4; lvl++) {
    // 1. Sửa lỗi mất dữ liệu: Các bản ghi cũ không có level_id sẽ được đưa mặc định vào Level 0
    var levelRecords = allRecords.filter(r => {
        var id = r.level_id !== undefined ? parseInt(r.level_id) : 0;
        return id === lvl;
    });
    
    // 2. Sửa lỗi hardcode: Số lượng câu hỏi tự động thay đổi theo dữ liệu gốc của từng Level
    var qCount = ALL_LEVELS[lvl].length;

    html += '<div class="level-card"><div class="level-card-header" onclick="toggleLevelCard(this)" style="background:linear-gradient(135deg,'+['#e0f2fe','#ede9fe','#fce7f3','#fef3c7'][lvl]+',#fff)">';
    html += '<span>' + LEVEL_NAMES[lvl] + '</span><span class="text-sm" style="color:var(--text-mid)">' + levelRecords.length + ' lượt chơi <i data-lucide="chevron-down" style="width:16px;height:16px;display:inline"></i></span></div>';
    html += '<div class="level-card-body">';
    
    if (!levelRecords.length) {
      html += '<p class="text-sm py-4" style="color:var(--text-mid)">Chưa có dữ liệu.</p>';
    } else {
      html += '<div class="space-y-3 pt-2">';
      for (var qi = 0; qi < qCount; qi++) {
        var correctCount = 0, totalCount = 0;
        
        levelRecords.forEach(r => {
          try {
            if (r.question_results) {
              // 3. Xử lý an toàn khi parse chuỗi thống kê từng câu hỏi
              var arr = typeof r.question_results === 'string' ? JSON.parse(r.question_results) : r.question_results;
              if (Array.isArray(arr) && arr.length > qi) {
                totalCount++;
                if (arr[qi]) correctCount++;
              }
            }
          } catch(e) { console.warn("Lỗi đọc dữ liệu câu hỏi:", e); }
        });
        
        // 4. Sửa logic tính % sai (khi không có ai làm, pctWrong sẽ an toàn ở mức 0)
        var pctCorrect = totalCount ? Math.round((correctCount / totalCount) * 100) : 0;
        var pctWrong = totalCount ? (100 - pctCorrect) : 0;
        
        // Mở rộng độ rộng w-16 cho chữ "Câu 10" không bị rớt dòng trên điện thoại
        html += '<div class="flex items-center gap-3"><span class="text-sm font-semibold w-16 shrink-0">Câu ' + (qi + 1) + '</span>';
        html += '<div class="perf-bar flex-1">';
        
        if (pctCorrect > 0) html += '<div class="perf-bar-correct" style="width:' + pctCorrect + '%">' + pctCorrect + '%</div>';
        if (pctWrong > 0 && totalCount > 0) html += '<div class="perf-bar-wrong" style="width:' + pctWrong + '%">' + pctWrong + '%</div>';
        if (!totalCount) html += '<div class="flex-1 flex items-center justify-center text-xs" style="color:var(--text-mid)">Chưa có chi tiết</div>';
        
        html += '</div></div>';
      }
      html += '</div>';
    }
    html += '</div></div>';
  }
  
  container.innerHTML = html;
  if (typeof lucide !== 'undefined') lucide.createIcons();
}

function toggleLevelCard(header){
  var body=header.nextElementSibling;
  body.classList.toggle('open');
}
