<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thống Kê Physics Quest</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', sans-serif; background: #f0f4ff; color: #2d3250; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .perf-bar { height: 28px; border-radius: 6px; overflow: hidden; display: flex; width: 100%; background: #f1f5f9; }
        .perf-bar-correct { background: #4ade80; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; color: #fff; transition: width .4s; }
        .perf-bar-wrong { background: #fca5a5; display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 700; color: #fff; transition: width .4s; }
        .level-card-body { display: none; }
        .level-card-body.open { display: block; }
        .level-card-header { cursor: pointer; transition: background .2s; }
        .level-card-header:hover { background: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">📊 Thống kê Physics Quest</h1>

        <div class="card p-6 mb-8">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="trophy" class="text-yellow-500"></i> Bảng Xếp Hạng</h2>
            <div id="lb-list" class="space-y-3">
                <p class="text-gray-400 text-center py-4">Đang tải dữ liệu...</p>
            </div>
        </div>

        <div class="card p-6">
            <button onclick="document.getElementById('perf-auth').classList.toggle('hidden')" class="text-indigo-600 font-bold flex items-center gap-2">
                <i data-lucide="lock"></i> Khu vực quản trị
            </button>
            <div id="perf-auth" class="hidden mt-4 space-y-4">
                <input type="password" id="perf-pw" placeholder="Nhập mật khẩu..." class="border p-2 rounded w-full max-w-xs">
                <button onclick="checkPassword()" class="px-4 py-2 bg-gray-800 text-white rounded font-bold">Xác nhận</button>
            </div>
            <div id="perf-dashboard" class="hidden mt-6">
                <h3 class="text-xl font-bold mb-4">Chi tiết hiệu suất từng câu</h3>
                <div id="perf-levels-container"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyArKIBD9RWIOhNgPrPLKtPHn1EsQUHjmE8",
            authDomain: "score-57210.firebaseapp.com",
            databaseURL: "https://score-57210-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "score-57210",
            storageBucket: "score-57210.firebasestorage.app",
            messagingSenderId: "425618398285",
            appId: "1:425618398285:web:47eccf49c844df2e865004"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.allRecords = [];

        onValue(ref(db, 'leaderboard'), (snapshot) => {
            const data = [];
            snapshot.forEach(child => { data.push(child.val()); });
            window.allRecords = data.sort((a, b) => b.score - a.score || a.completion_time_seconds - b.completion_time_seconds);
            renderLeaderboard();
        });

        function renderLeaderboard() {
            const list = document.getElementById('lb-list');
            list.innerHTML = window.allRecords.length > 0 ? '' : '<p class="text-gray-400 text-center py-4">Chưa có dữ liệu.</p>';
            window.allRecords.slice(0, 20).forEach((entry, i) => {
                const row = document.createElement('div');
                row.className = 'flex items-center justify-between p-4 bg-gray-50 rounded-xl border border-gray-100';
                row.innerHTML = `<div class="flex items-center gap-4"><span class="font-bold text-lg w-8 text-center text-indigo-500">#${i+1}</span><span class="font-semibold">${entry.player_name || 'Ẩn danh'}</span></div><div class="text-right font-bold text-indigo-600">${entry.score || 0} điểm</div>`;
                list.appendChild(row);
            });
            if(typeof lucide !== 'undefined') lucide.createIcons();
        }
    </script>

    <script>
    let perfUnlocked = false;
    function checkPassword() {
        if(document.getElementById('perf-pw').value === '12345') {
            perfUnlocked = true;
            document.getElementById('perf-auth').classList.add('hidden');
            document.getElementById('perf-dashboard').classList.remove('hidden');
            renderPerfDashboard();
        } else {
            alert('Sai mật khẩu rồi chủ nhân ơi! Thử lại nha!');
        }
    }

    function renderPerfDashboard() {
        const container = document.getElementById('perf-levels-container');
        const LEVEL_NAMES = ['Level 0', 'Level 1', 'Level 2', 'Level 3'];
        let html = '';

        for (let lvl = 0; lvl < 4; lvl++) {
            let levelRecords = window.allRecords.filter(r => (r.level_id !== undefined ? parseInt(r.level_id) : 0) === lvl);
            
            html += `<div class="card mb-4 overflow-hidden">
                <div class="level-card-header p-4 font-bold flex justify-between bg-gray-50" onclick="this.nextElementSibling.classList.toggle('hidden')">
                    ${LEVEL_NAMES[lvl]} <span>${levelRecords.length} lượt chơi</span>
                </div>
                <div class="hidden p-4 space-y-3">`;

            if (levelRecords.length > 0) {
                // Giả định mỗi level có 10 câu hỏi
                for (let qi = 0; qi < 10; qi++) {
                    let correctCount = 0, totalCount = 0;
                    levelRecords.forEach(r => {
                        let res = r.question_results;
                        let arr = (typeof res === 'string') ? JSON.parse(res) : res;
                        
                        // Kiểm tra giá trị tại vị trí câu thứ qi
                        let val = Array.isArray(arr) ? arr[qi] : (arr ? arr[qi.toString()] : undefined);
                        
                        if (val !== undefined) {
                            totalCount++;
                            // Chấp nhận các kiểu dữ liệu true/1/"true"
                            if (val === true || val === 1 || val === "true") correctCount++;
                        }
                    });
                    
                    let pct = totalCount ? Math.round((correctCount / totalCount) * 100) : 0;
                    html += `
                    <div class="flex items-center gap-3 text-sm">
                        <span class="w-16 font-medium">Câu ${qi + 1}</span>
                        <div class="perf-bar flex-1">
                            ${pct > 0 ? `<div class="perf-bar-correct" style="width:${pct}%">${pct}%</div>` : ''}
                            ${pct < 100 ? `<div class="perf-bar-wrong" style="width:${100 - pct}%">${pct > 0 ? (100 - pct) + '%' : ''}</div>` : ''}
                        </div>
                    </div>`;
                }
            } else {
                html += `<p class="text-sm text-gray-400 italic">Chưa có dữ liệu cho level này ạ!</p>`;
            }
            html += `</div></div>`;
        }
        container.innerHTML = html;
        if(typeof lucide !== 'undefined') lucide.createIcons();
    }
</script>
    </script>
</body>
</html>
